name: PR Tests

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  syntax:
    name: Syntax checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run Go vet
        run: go vet ./...

      - name: Check embedded web JavaScript syntax
        run: |
          tmpdir="$(mktemp -d)"
          python3 - <<'PY' "$tmpdir"
          from pathlib import Path
          import re
          import sys

          out = Path(sys.argv[1])
          for page in Path("internal/app/web").glob("*.html"):
              text = page.read_text()
              for idx, match in enumerate(re.finditer(r"<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>", text, re.S | re.I), 1):
                  script_path = out / f"{page.stem}-{idx}.js"
                  script_path.write_text(match.group(1))
                  print(script_path)
          PY
          for script in "$tmpdir"/*.js; do
            [ -e "$script" ] || continue
            node --check "$script"
          done

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go unit tests
        run: go test ./...

  playwright:
    name: Playwright e2e tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browser
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright test suite
        run: make test-e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          if-no-files-found: ignore
          retention-days: 7
