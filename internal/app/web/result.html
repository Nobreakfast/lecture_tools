<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>答题结果</title>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)'], ['$', '$']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; max-width: 820px; margin: 24px auto; padding: 0 12px; }
    .card { border: 1px solid #e5e7eb; border-radius: 14px; padding: 16px; margin-bottom: 12px; }
    .ok { color: #065f46; } .bad { color: #991b1b; }
    .btn { padding: 10px 14px; border: 0; border-radius: 10px; background:#111827; color:#fff; margin-right:8px; }
  </style>
</head>
<body>
  <div style="margin-bottom:12px;">
    <button class="btn" id="pdfBtn">导出为 PDF</button>
    <button class="btn" id="imgBtn">导出为图片</button>
  </div>
  <div id="captureRoot">
    <h2 id="title">结果加载中...</h2>
    <div id="summary" class="card"></div>
    <div id="list"></div>
  </div>
  <script>
    let resultData = null;
    function escapeHTML(s) {
      return String(s || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }
    function optionText(q, key) {
      if (!key) return '未作答';
      const found = (q.options || []).find(op => op.key === key);
      if (!found) return key;
      return `${found.key}. ${found.text}`;
    }
    async function typesetResult() {
      const root = document.getElementById('captureRoot');
      if (window.MathJax && window.MathJax.typesetPromise) {
        if (window.MathJax.typesetClear) {
          window.MathJax.typesetClear([root]);
        }
        await window.MathJax.typesetPromise([root]);
      }
    }
    async function load() {
      const r = await fetch('/api/result', { credentials:'include' });
      if (!r.ok) {
        alert(await r.text());
        location.href = '/quiz';
        return;
      }
      const data = await r.json();
      resultData = data;
      document.getElementById('title').textContent = `${data.quiz_title}（${data.score.correct}/${data.score.total}）`;
      const s = data.summary;
      document.getElementById('summary').innerHTML = `
        <h3>学习建议（AI功能已关闭）</h3>
        <p><strong>掌握较好：</strong>${(s.strengths||[]).join('、') || '暂无'}</p>
        <p><strong>建议巩固：</strong>${(s.weaknesses||[]).join('、') || '暂无'}</p>
        <p><strong>行动建议：</strong>${(s.next_actions||[]).join('；')}</p>
        <p><strong>优先级：</strong>${s.priority_level || s.priority || '中'}</p>
        <p>${s.encouragement || ''}</p>
      `;
      const root = document.getElementById('list');
      root.innerHTML = '';
      data.questions.forEach((q, idx) => {
        const card = document.createElement('div');
        card.className = 'card';
        if (q.is_survey) {
          if (q.type === 'short_answer') {
            card.innerHTML = `<strong>${idx+1}. ${escapeHTML(q.stem)}</strong><p>你的回答：${escapeHTML(q.answer || '未作答')}</p><p>该题为沟通题，不判对错。</p>`;
          } else {
            card.innerHTML = `<strong>${idx+1}. ${escapeHTML(q.stem)}</strong><p>你的选择：${escapeHTML(optionText(q, q.answer))}</p><p>该题为沟通题，不判对错。</p>`;
          }
        } else {
          card.innerHTML = `<strong>${idx+1}. ${escapeHTML(q.stem)}</strong><p>你的选择：${escapeHTML(optionText(q, q.answer))}</p><p>正确答案：${escapeHTML(optionText(q, q.correct))}</p><p class="${q.is_correct ? 'ok':'bad'}">${q.is_correct ? '回答正确' : '回答错误'}</p>`;
        }
        root.appendChild(card);
      });
      await typesetResult();
    }
    function downloadBlob(blob, fileName) {
      const a = document.createElement('a');
      const url = URL.createObjectURL(blob);
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }
    async function renderReportCanvas() {
      await typesetResult();
      const root = document.getElementById('captureRoot');
      if (!window.html2canvas) throw new Error('html2canvas not loaded');
      const canvas = await window.html2canvas(root, {
        scale: 2,
        backgroundColor: '#ffffff',
        useCORS: true
      });
      return canvas;
    }
    function toUint8(dataURL) {
      const b64 = dataURL.split(',')[1];
      const raw = atob(b64);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }
    function buildPDFWithJPEG(jpegBytes, imgW, imgH) {
      const encoder = new TextEncoder();
      const parts = [];
      const offsets = [0];
      let pos = 0;
      const pushText = (s) => {
        const d = encoder.encode(s);
        parts.push(d);
        pos += d.length;
      };
      const pushBytes = (b) => {
        parts.push(b);
        pos += b.length;
      };
      const pageW = 595.28;
      const pageH = 841.89;
      let drawW = pageW - 40;
      let drawH = drawW * imgH / imgW;
      if (drawH > pageH - 40) {
        drawH = pageH - 40;
        drawW = drawH * imgW / imgH;
      }
      const x = (pageW - drawW) / 2;
      const y = (pageH - drawH) / 2;
      const content = `q\n${drawW.toFixed(2)} 0 0 ${drawH.toFixed(2)} ${x.toFixed(2)} ${y.toFixed(2)} cm\n/Im0 Do\nQ\n`;

      pushText('%PDF-1.4\n%\xE2\xE3\xCF\xD3\n');
      offsets.push(pos); pushText('1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n');
      offsets.push(pos); pushText('2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n');
      offsets.push(pos); pushText(`3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageW.toFixed(2)} ${pageH.toFixed(2)}] /Resources 6 0 R /Contents 5 0 R >>\nendobj\n`);
      offsets.push(pos); pushText(`4 0 obj\n<< /Type /XObject /Subtype /Image /Width ${imgW} /Height ${imgH} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpegBytes.length} >>\nstream\n`); pushBytes(jpegBytes); pushText('\nendstream\nendobj\n');
      const contentBytes = encoder.encode(content);
      offsets.push(pos); pushText(`5 0 obj\n<< /Length ${contentBytes.length} >>\nstream\n${content}endstream\nendobj\n`);
      offsets.push(pos); pushText('6 0 obj\n<< /XObject << /Im0 4 0 R >> >>\nendobj\n');
      const xrefPos = pos;
      pushText('xref\n0 7\n');
      pushText('0000000000 65535 f \n');
      for (let i = 1; i <= 6; i++) pushText(String(offsets[i]).padStart(10, '0') + ' 00000 n \n');
      pushText(`trailer\n<< /Size 7 /Root 1 0 R >>\nstartxref\n${xrefPos}\n%%EOF`);
      return new Blob(parts, { type: 'application/pdf' });
    }
    async function exportImage() {
      if (!resultData) return;
      try {
        const canvas = await renderReportCanvas();
        canvas.toBlob((png) => {
          if (!png) {
            alert('图片导出失败，请重试');
            return;
          }
          downloadBlob(png, `${resultData.student.student_no}.png`);
        }, 'image/png');
      } catch (e) {
        alert('图片导出失败，请刷新页面后重试');
      }
    }
    async function exportPDF() {
      if (!resultData) return;
      try {
        const canvas = await renderReportCanvas();
        const jpeg = toUint8(canvas.toDataURL('image/jpeg', 0.92));
        const pdf = buildPDFWithJPEG(jpeg, canvas.width, canvas.height);
        downloadBlob(pdf, `${resultData.student.student_no}.pdf`);
      } catch (e) {
        alert('PDF导出失败，请刷新页面后重试');
      }
    }
    document.getElementById('imgBtn').onclick = exportImage;
    document.getElementById('pdfBtn').onclick = exportPDF;
    load();
  </script>
</body>
</html>
