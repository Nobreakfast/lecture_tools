<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>作业评分</title>
  <link rel="stylesheet" href="/static/app.css" />
  <style>
    body { min-height: 100vh; background: #f8fafc; }
    .grade-shell { min-height: 100vh; display: grid; grid-template-columns: minmax(0, 1fr) 420px; }
    .pdf-pane { background: #111827; min-height: 100vh; display: flex; flex-direction: column; }
    .pdf-toolbar { min-height: 52px; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px; color: #fff; border-bottom: 1px solid rgba(255,255,255,.12); }
    .pdf-toolbar a { color: #bfdbfe; text-decoration: none; font-size: 13px; }
    .pdf-frame { flex: 1; width: 100%; border: 0; background: #1f2937; }
    .pdf-empty { flex: 1; display: grid; place-items: center; color: #cbd5e1; padding: 24px; text-align: center; }
    .side-pane { background: #fff; border-left: 1px solid var(--border); padding: 18px; overflow: auto; }
    .top-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
    .title { font-size: 20px; font-weight: 700; color: var(--text); }
    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0 16px; }
    .meta-item { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 9px 10px; font-size: 13px; color: var(--text-secondary); }
    .meta-item strong { display: block; color: var(--text); font-size: 12px; margin-bottom: 3px; }
    .pregrade-card { display: none; margin: 12px 0 16px; padding: 12px; border: 1px solid #bfdbfe; border-radius: 8px; background: #eff6ff; color: #1e3a8a; }
    .pregrade-card.show { display: block; }
    .pregrade-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .pregrade-title { font-size: 14px; font-weight: 750; color: #1e40af; }
    .pregrade-body { white-space: pre-wrap; font-size: 13px; line-height: 1.7; color: #1e3a8a; }
    .pregrade-meta { margin-top: 8px; font-size: 12px; color: #475569; line-height: 1.6; }
    .nav-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin: 12px 0; flex-wrap: wrap; }
    .nav-row .nav-status { color: var(--text-secondary); font-size: 12px; }
    .mask-toggle { display: inline-flex; align-items: center; gap: 8px; margin: 2px 0 8px; font-size: 13px; color: var(--text); font-weight: 650; }
    .mask-toggle input { width: auto; }
    label { display: block; font-size: 13px; font-weight: 650; margin: 14px 0 6px; color: var(--text); }
    input, textarea { width: 100%; font-family: inherit; font-size: 14px; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
    input:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
    textarea { min-height: 220px; resize: vertical; line-height: 1.7; }
    #aiNote { min-height: 86px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
    button, .link-btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; background: var(--primary); color: #fff; border: none; border-radius: 8px; padding: 10px 14px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; }
    button.secondary, .link-btn.secondary { background: #e2e8f0; color: #1e293b; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .save-status { margin-top: 8px; min-height: 18px; color: var(--text-secondary); font-size: 12px; }
    .save-status.error { color: var(--danger); }
    .message { display: none; margin-top: 12px; padding: 10px 12px; border-radius: 8px; font-size: 13px; }
    .message.show { display: block; }
    .message.info { background: #eff6ff; color: #1d4ed8; }
    .message.error { background: #fef2f2; color: #b91c1c; }
    .badge { display: inline-flex; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .badge-ok { background: var(--success-bg); color: var(--success); }
    .badge-muted { background: #f1f5f9; color: var(--text-muted); }
    @media (max-width: 900px) {
      .grade-shell { grid-template-columns: 1fr; }
      .pdf-pane { min-height: 55vh; }
      .side-pane { border-left: 0; border-top: 1px solid var(--border); }
    }
  </style>
</head>
<body>
  <main class="grade-shell">
    <section class="pdf-pane">
      <div class="pdf-toolbar">
        <div id="pdfTitle">报告 PDF</div>
        <a id="pdfDownload" href="#" target="_blank" style="display:none;">下载 PDF</a>
      </div>
      <iframe id="pdfFrame" class="pdf-frame" title="报告 PDF" style="display:none;"></iframe>
      <div id="pdfEmpty" class="pdf-empty">正在加载报告...</div>
    </section>
    <aside class="side-pane">
      <div class="top-row">
        <div>
          <div class="title">作业评分</div>
          <div id="publishBadge" class="badge badge-muted" style="margin-top:6px;">成绩未公布</div>
        </div>
        <a id="backLink" class="link-btn secondary" href="/teacher">返回</a>
      </div>

      <div class="nav-row">
        <button id="prevBtn" class="secondary" type="button">上一份</button>
        <span id="navStatus" class="nav-status">正在加载列表...</span>
        <button id="nextBtn" class="secondary" type="button">下一份</button>
      </div>
      <label class="mask-toggle" for="anonymousToggle">
        <input id="anonymousToggle" type="checkbox" />
        匿名评分
      </label>
      <div class="meta-grid" id="studentMeta"></div>

      <div id="aiPregradeCard" class="pregrade-card">
        <div class="pregrade-head">
          <div>
            <div class="pregrade-title">AI预评</div>
            <div id="aiPregradeScore" style="font-size:13px;margin-top:3px;"></div>
          </div>
          <button id="useAIPregradeBtn" class="secondary" type="button" style="padding:7px 10px;font-size:13px;">采用预评</button>
        </div>
        <div id="aiPregradeBody" class="pregrade-body"></div>
        <div id="aiPregradeMeta" class="pregrade-meta"></div>
      </div>

      <label for="scoreInput">总分（0-100）</label>
      <input id="scoreInput" type="number" min="0" max="100" step="0.1" placeholder="例如 92.5" />

      <label for="feedbackInput">评语</label>
      <textarea id="feedbackInput" placeholder="请输入给学生的作业评价"></textarea>

      <label for="aiNote">简短发言</label>
      <textarea id="aiNote" placeholder="例如：结构完整，实验分析不够深入，请指出改进方向。"></textarea>
      <div class="actions">
        <button id="aiBtn" class="secondary">AI 生成评语</button>
        <button id="saveBtn">保存评分</button>
      </div>
      <div id="autosaveStatus" class="save-status"></div>
      <div id="msg" class="message info"></div>
    </aside>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const courseId = params.get('course_id') || '';
    let submissionId = params.get('submission_id') || '';
    let assignmentId = params.get('assignment_id') || '';
    let submission = null;
    let submissionsList = [];
    let anonymousMode = false;
    let autosaveTimer = null;
    let autosaveInFlight = null;
    let autosaveDirty = false;
    let lastSavedGradeSnapshot = '';
    let loadingGrade = false;
    const HOMEWORK_GRADE_SYNC_KEY = 'courseAssistantHomeworkGradeSync';
    let homeworkGradeSyncChannel = null;
    try {
      if ('BroadcastChannel' in window) homeworkGradeSyncChannel = new BroadcastChannel('course-assistant-homework-grade');
    } catch (_) { homeworkGradeSyncChannel = null; }

    function escapeHTML(s) {
      return String(s || '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
    }
    function setMsg(type, text) {
      const el = document.getElementById('msg');
      if (!text) { el.className = 'message'; el.textContent = ''; return; }
      el.className = 'message show ' + type;
      el.textContent = text;
    }
    function setAutosaveStatus(text, isError) {
      const el = document.getElementById('autosaveStatus');
      el.textContent = text || '';
      el.className = isError ? 'save-status error' : 'save-status';
    }
    function formatTime(v) {
      if (!v) return '—';
      const d = new Date(v);
      return Number.isNaN(d.getTime()) ? '—' : d.toLocaleString('zh-CN', { hour12: false });
    }
    function formatScore(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return '';
      return Number.isInteger(n) ? String(n) : n.toFixed(1);
    }
    function readGradeForm(showError) {
      const rawScore = document.getElementById('scoreInput').value.trim();
      const feedback = document.getElementById('feedbackInput').value.trim();
      let score = null;
      if (rawScore) {
        score = Number(rawScore);
        if (!Number.isFinite(score) || score < 0 || score > 100) {
          if (showError) setMsg('error', '总分必须在 0 到 100 之间。');
          return { ok: false };
        }
        if (Math.abs(score * 10 - Math.round(score * 10)) > 0.000001) {
          if (showError) setMsg('error', '总分最多保留一位小数。');
          return { ok: false };
        }
      }
      return { ok: true, payload: { score, feedback } };
    }
    function gradeSnapshot(payload) {
      return JSON.stringify([payload.score === undefined ? null : payload.score, payload.feedback || '']);
    }
    function currentGradeSnapshot() {
      const form = readGradeForm(false);
      return form.ok ? gradeSnapshot(form.payload) : '';
    }
    function formatLateInfo(info) {
      if (!info || !info.late) return '未迟交';
      const seconds = Number(info.late_seconds || 0);
      const days = Math.floor(seconds / 86400);
      const hours = Math.floor((seconds % 86400) / 3600);
      const mins = Math.floor((seconds % 3600) / 60);
      const parts = [];
      if (days) parts.push(days + '天');
      if (hours) parts.push(hours + '小时');
      if (!days && mins) parts.push(mins + '分钟');
      const duration = parts.join('') || '不足1分钟';
      const penalty = info.late_penalty_points ? '，建议扣 ' + info.late_penalty_points + ' 分' : '';
      return '迟交 ' + duration + penalty;
    }
    function masked(value) {
      return anonymousMode ? '已遮盖' : escapeHTML(value || '—');
    }
    function teacherReturnURL() {
      const hp = new URLSearchParams();
      hp.set('tab', 'tab-upload');
      hp.set('subtab', 'sub-homework');
      if (courseId) hp.set('course', courseId);
      if (assignmentId) hp.set('assignment_id', assignmentId);
      const hash = hp.toString();
      return '/teacher' + (hash ? '#' + hash : '');
    }
    function updateBackLink() {
      document.getElementById('backLink').href = teacherReturnURL();
    }
    function homeworkGradeSyncPayload(reason) {
      return {
        type: 'homework-grade-updated',
        course_id: courseId,
        assignment_id: assignmentId || (submission && submission.assignment_id) || '',
        submission_id: submissionId,
        updated_at: Date.now(),
        reason: reason || 'save'
      };
    }
    function notifyHomeworkGradeChanged(reason) {
      const payload = homeworkGradeSyncPayload(reason);
      try { localStorage.setItem(HOMEWORK_GRADE_SYNC_KEY, JSON.stringify(payload)); } catch (_) { }
      try { if (homeworkGradeSyncChannel) homeworkGradeSyncChannel.postMessage(payload); } catch (_) { }
      try {
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage(payload, window.location.origin);
        }
      } catch (_) { }
    }
    function gradeURL(id) {
      const qp = new URLSearchParams();
      qp.set('course_id', courseId);
      qp.set('submission_id', id);
      if (assignmentId) qp.set('assignment_id', assignmentId);
      return location.pathname + '?' + qp.toString();
    }
    function currentIndex() {
      return submissionsList.findIndex(item => String(item.id) === String(submissionId));
    }
    function updateNavigation() {
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const status = document.getElementById('navStatus');
      const idx = currentIndex();
      const hasList = submissionsList.length > 0 && idx >= 0;
      prevBtn.disabled = !hasList || idx <= 0;
      nextBtn.disabled = !hasList || idx >= submissionsList.length - 1;
      status.textContent = hasList ? `${idx + 1} / ${submissionsList.length}` : '未找到同作业提交列表';
    }
    async function loadSubmissionList() {
      if (!courseId || !assignmentId) {
        updateNavigation();
        return;
      }
      const url = '/api/teacher/courses/homework/submissions?course_id=' + encodeURIComponent(courseId) + '&assignment_id=' + encodeURIComponent(assignmentId);
      const r = await fetch(url, { credentials: 'include' });
      if (!r.ok) {
        updateNavigation();
        return;
      }
      const data = await r.json();
      submissionsList = data.items || [];
      updateNavigation();
    }
    async function goRelative(delta) {
      const idx = currentIndex();
      const next = submissionsList[idx + delta];
      if (!next) return;
      if (!await flushAutosave()) return;
      submissionId = String(next.id);
      history.replaceState(null, '', gradeURL(submissionId));
      setMsg('', '');
      loadGrade();
    }

    async function loadGrade() {
      if (!courseId || !submissionId) {
        setMsg('error', '缺少 course_id 或 submission_id。');
        return;
      }
      loadingGrade = true;
      setAutosaveStatus('');
      const r = await fetch('/api/teacher/courses/homework/submissions/grade?course_id=' + encodeURIComponent(courseId) + '&id=' + encodeURIComponent(submissionId), { credentials: 'include' });
      if (!r.ok) {
        loadingGrade = false;
        setMsg('error', await r.text());
        return;
      }
      const data = await r.json();
      submission = data.submission || {};
      assignmentId = submission.assignment_id || assignmentId;
      updateBackLink();
      render(data.grade_published);
      loadingGrade = false;
      await loadSubmissionList();
    }

    function render(published) {
      document.getElementById('publishBadge').textContent = published ? '成绩已公布' : '成绩未公布';
      document.getElementById('publishBadge').className = published ? 'badge badge-ok' : 'badge badge-muted';
      renderMeta();
      renderAIPregrade();
      document.getElementById('scoreInput').value = submission.score !== undefined && submission.score !== null ? formatScore(submission.score) : '';
      document.getElementById('feedbackInput').value = submission.feedback || '';
      lastSavedGradeSnapshot = currentGradeSnapshot();
      const report = submission.files && submission.files.report;
      document.getElementById('aiBtn').disabled = false;
      if (report && report.uploaded && submission.report_preview_url) {
        document.getElementById('pdfFrame').src = submission.report_preview_url;
        document.getElementById('pdfFrame').style.display = '';
        document.getElementById('pdfEmpty').style.display = 'none';
        document.getElementById('pdfTitle').textContent = report.original_name || '报告 PDF';
        document.getElementById('pdfDownload').href = submission.report_download_url || submission.report_preview_url;
        document.getElementById('pdfDownload').style.display = '';
      } else {
        document.getElementById('pdfFrame').src = '';
        document.getElementById('pdfFrame').style.display = 'none';
        document.getElementById('pdfEmpty').style.display = '';
        document.getElementById('pdfEmpty').textContent = '该提交没有报告 PDF，可在右侧手动评分。';
        document.getElementById('pdfTitle').textContent = '报告 PDF';
        document.getElementById('pdfDownload').style.display = 'none';
        document.getElementById('aiBtn').disabled = true;
      }
    }

    function renderMeta() {
      const hasScore = submission.score !== undefined && submission.score !== null;
      document.getElementById('studentMeta').innerHTML =
        '<div class="meta-item"><strong>作业</strong>' + escapeHTML(submission.assignment_id) + '</div>' +
        '<div class="meta-item"><strong>姓名</strong>' + masked(submission.name) + '</div>' +
        '<div class="meta-item"><strong>学号</strong>' + masked(submission.student_no) + '</div>' +
        '<div class="meta-item"><strong>班级</strong>' + masked(submission.class_name) + '</div>' +
        '<div class="meta-item"><strong>Deadline</strong>' + escapeHTML(formatTime(submission.deadline_at)) + '</div>' +
        '<div class="meta-item"><strong>迟交</strong>' + escapeHTML(formatLateInfo(submission.late_info)) + '</div>' +
        '<div class="meta-item"><strong>最后提交</strong>' + escapeHTML(formatTime(submission.updated_at)) + '</div>' +
        '<div class="meta-item"><strong>评分</strong>' + (hasScore ? escapeHTML(formatScore(submission.score)) + '/100' : '未评分') + '</div>';
    }

    function renderAIPregrade() {
      const card = document.getElementById('aiPregradeCard');
      const hasScore = submission.ai_pregrade_score !== undefined && submission.ai_pregrade_score !== null;
      const feedback = submission.ai_pregrade_feedback || '';
      const error = submission.ai_pregrade_error || '';
      if (!hasScore && !feedback && !error) {
        card.className = 'pregrade-card';
        return;
      }
      card.className = 'pregrade-card show';
      document.getElementById('useAIPregradeBtn').disabled = !hasScore && !feedback;
      document.getElementById('aiPregradeScore').textContent = hasScore ? `建议分：${formatScore(submission.ai_pregrade_score)}/100` : '建议分：暂无';
      document.getElementById('aiPregradeBody').textContent = feedback || ('预评失败：' + error);
      const parts = [];
      if (submission.ai_pregraded_at) parts.push('生成时间：' + formatTime(submission.ai_pregraded_at));
      if (submission.ai_pregrade_prompt) parts.push('点评维度：' + submission.ai_pregrade_prompt);
      if (error && feedback) parts.push('最近错误：' + error);
      document.getElementById('aiPregradeMeta').textContent = parts.join('\n');
    }

    function useAIPregrade() {
      if (submission.ai_pregrade_score !== undefined && submission.ai_pregrade_score !== null) {
        document.getElementById('scoreInput').value = formatScore(submission.ai_pregrade_score);
      }
      if (submission.ai_pregrade_feedback) {
        document.getElementById('feedbackInput').value = submission.ai_pregrade_feedback;
      }
      setMsg('info', 'AI 预评已填入评分表单，可继续修改后保存。');
      queueAutosave();
    }

    function queueAutosave() {
      if (loadingGrade) return;
      autosaveDirty = true;
      clearTimeout(autosaveTimer);
      setAutosaveStatus('尚未保存，稍后自动保存...');
      autosaveTimer = setTimeout(() => {
        persistGrade({ autosave: true });
      }, 900);
    }

    async function flushAutosave() {
      clearTimeout(autosaveTimer);
      const snapshot = currentGradeSnapshot();
      if (!snapshot) {
        setAutosaveStatus('分数格式有误，暂未自动保存。', true);
        return false;
      }
      if (snapshot !== lastSavedGradeSnapshot) {
        return await persistGrade({ autosave: true });
      } else if (autosaveInFlight) {
        return await autosaveInFlight;
      }
      return true;
    }

    async function persistGrade(opts) {
      opts = opts || {};
      const manual = !!opts.manual;
      if (autosaveInFlight) {
        await autosaveInFlight;
      }
      const form = readGradeForm(manual);
      if (!form.ok) {
        if (!manual) setAutosaveStatus('分数格式有误，暂未自动保存。', true);
        return false;
      }
      const snapshot = gradeSnapshot(form.payload);
      if (!manual && snapshot === lastSavedGradeSnapshot) {
        autosaveDirty = false;
        setAutosaveStatus('已自动保存');
        return true;
      }
      autosaveDirty = false;
      if (manual) {
        setMsg('info', '正在保存...');
      } else {
        setAutosaveStatus('正在自动保存...');
      }
      autosaveInFlight = fetch('/api/teacher/courses/homework/submissions/grade?course_id=' + encodeURIComponent(courseId) + '&id=' + encodeURIComponent(submissionId), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify(form.payload)
      }).then(async r => {
        if (!r.ok) throw new Error(await r.text());
        const data = await r.json();
        submission = data.submission || submission;
        lastSavedGradeSnapshot = snapshot;
        renderMeta();
        await loadSubmissionList();
        notifyHomeworkGradeChanged(manual ? 'manual-save' : 'autosave');
        if (manual) {
          setMsg('info', form.payload.score === null ? '评语草稿已保存。' : '评分已保存。');
        } else {
          setAutosaveStatus('已自动保存');
        }
        return true;
      }).catch(err => {
        const text = err && err.message ? err.message : '保存失败';
        if (manual) {
          setMsg('error', text);
        } else {
          setAutosaveStatus('自动保存失败：' + text, true);
        }
        return false;
      }).finally(() => {
        autosaveInFlight = null;
        if (autosaveDirty) queueAutosave();
      });
      return autosaveInFlight;
    }

    async function saveGrade() {
      clearTimeout(autosaveTimer);
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      try {
        await persistGrade({ manual: true });
      } finally {
        btn.disabled = false;
      }
    }

    async function generateFeedback() {
      const btn = document.getElementById('aiBtn');
      btn.disabled = true;
      setMsg('info', 'AI 正在生成评语...');
      try {
        const r = await fetch('/api/teacher/courses/homework/submissions/grade-ai?course_id=' + encodeURIComponent(courseId) + '&id=' + encodeURIComponent(submissionId), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ note: document.getElementById('aiNote').value.trim() })
        });
        if (!r.ok) { setMsg('error', await r.text()); return; }
        const data = await r.json();
        document.getElementById('feedbackInput').value = data.feedback || '';
        setMsg('info', 'AI 评语已生成，可继续修改后保存。');
        queueAutosave();
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('saveBtn').onclick = saveGrade;
    document.getElementById('aiBtn').onclick = generateFeedback;
    document.getElementById('useAIPregradeBtn').onclick = useAIPregrade;
    document.getElementById('prevBtn').onclick = () => goRelative(-1);
    document.getElementById('nextBtn').onclick = () => goRelative(1);
    document.getElementById('scoreInput').addEventListener('input', queueAutosave);
    document.getElementById('feedbackInput').addEventListener('input', queueAutosave);
    document.getElementById('backLink').addEventListener('click', async (e) => {
      e.preventDefault();
      if (!await flushAutosave()) return;
      notifyHomeworkGradeChanged('return');
      window.close();
      setTimeout(() => {
        location.href = teacherReturnURL();
      }, 250);
    });
    document.getElementById('anonymousToggle').onchange = (e) => {
      anonymousMode = !!e.target.checked;
      if (submission) renderMeta();
    };
    updateBackLink();
    loadGrade();
  </script>
</body>
</html>
