<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>课堂入口</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 420px;
      padding: 32px 28px;
    }
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    .header .icon {
      font-size: 40px;
      line-height: 1;
      margin-bottom: 8px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: .5px;
    }
    .header p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-top: 4px;
    }
    .status-msg {
      text-align: center;
      color: var(--text-secondary);
      font-size: 15px;
      padding: 12px 0;
    }
    /* waiting animation */
    .waiting {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 20px 0 8px;
    }
    .waiting .dots {
      display: flex;
      gap: 6px;
    }
    .waiting .dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary);
      opacity: .3;
      animation: dot-pulse 1.4s infinite ease-in-out;
    }
    .waiting .dots span:nth-child(2) { animation-delay: .2s; }
    .waiting .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes dot-pulse {
      0%, 80%, 100% { opacity: .3; transform: scale(.8); }
      40% { opacity: 1; transform: scale(1); }
    }
    .waiting .wait-icon {
      font-size: 36px;
      line-height: 1;
    }
    .waiting .wait-text {
      font-size: 15px;
      color: var(--text-secondary);
    }
    /* form */
    .form-group { margin-top: 14px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      color: var(--text);
      background: var(--bg);
      transition: border-color .2s, outline .2s;
    }
    .form-group input:focus {
      border-color: var(--primary);
      outline: 2px solid var(--primary);
      outline-offset: -1px;
    }
    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }
    button:hover { background: var(--primary-hover); }
    button:active { transform: scale(.98); }
    .hint {
      text-align: center;
      color: var(--text-secondary);
      font-size: 13px;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon">📝</div>
      <h1>课堂答题</h1>
      <p>填写信息后进入答题</p>
    </div>

    <!-- 初始加载 -->
    <div id="loading" class="status-msg">正在检查状态…</div>

    <!-- 等待开放 -->
    <div id="wait" style="display:none;">
      <div class="waiting">
        <div class="wait-icon">⏳</div>
        <div class="wait-text">入口暂未开放，请等待老师开启</div>
        <div class="dots"><span></span><span></span><span></span></div>
      </div>
    </div>

    <!-- 表单 -->
    <div id="form" style="display:none;">
      <div class="form-group">
        <label for="name">姓名</label>
        <input id="name" placeholder="请输入姓名" />
      </div>
      <div class="form-group">
        <label for="student_no">学号</label>
        <input id="student_no" placeholder="请输入学号" />
      </div>
      <div class="form-group">
        <label for="class_name">班级</label>
        <input id="class_name" placeholder="请输入班级" />
      </div>
      <button id="start">开始答题</button>
      <div class="hint">无需注册账号，系统会自动保存进度。</div>
    </div>
  </div>

  <script>
    const loadingEl = document.getElementById('loading');
    const waitEl = document.getElementById('wait');
    const formEl = document.getElementById('form');
    let pollTimer = null;

    // ---------- session resume ----------
    async function checkSession() {
      try {
        const r = await fetch('/api/me', { credentials: 'include' });
        if (r.ok) {
          const data = await r.json();
          const st = data.attempt && data.attempt.status;
          if (st === 'in_progress') { location.href = '/quiz'; return; }
          if (st === 'submitted')   { location.href = '/result'; return; }
        }
      } catch (_) { /* no session */ }
      // no active session — check entry status
      prefillFromStorage();
      checkEntry();
    }

    // ---------- entry status ----------
    async function checkEntry() {
      try {
        const r = await fetch('/api/entry-status', { credentials: 'include' });
        if (!r.ok) {
          loadingEl.textContent = '状态读取失败，请稍后刷新。';
          return;
        }
        const data = await r.json();
        if (data.entry_open) {
          showForm();
        } else {
          showWaiting();
          startPoll();
        }
      } catch (_) {
        loadingEl.textContent = '网络异常，请检查连接。';
      }
    }

    function showForm() {
      stopPoll();
      loadingEl.style.display = 'none';
      waitEl.style.display = 'none';
      formEl.style.display = 'block';
    }

    function showWaiting() {
      loadingEl.style.display = 'none';
      formEl.style.display = 'none';
      waitEl.style.display = 'block';
    }

    function startPoll() {
      if (pollTimer) return;
      pollTimer = setInterval(async () => {
        try {
          const r = await fetch('/api/entry-status', { credentials: 'include' });
          if (r.ok) {
            const data = await r.json();
            if (data.entry_open) showForm();
          }
        } catch (_) {}
      }, 3000);
    }

    function stopPoll() {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    }

    // ---------- localStorage ----------
    function prefillFromStorage() {
      const saved = localStorage.getItem('student_info');
      if (!saved) return;
      try {
        const info = JSON.parse(saved);
        if (info.name)       document.getElementById('name').value = info.name;
        if (info.student_no) document.getElementById('student_no').value = info.student_no;
        if (info.class_name) document.getElementById('class_name').value = info.class_name;
      } catch (_) {}
    }

    function saveToStorage(info) {
      localStorage.setItem('student_info', JSON.stringify(info));
    }

    // ---------- join ----------
    document.getElementById('start').addEventListener('click', async () => {
      const body = {
        name: document.getElementById('name').value.trim(),
        student_no: document.getElementById('student_no').value.trim(),
        class_name: document.getElementById('class_name').value.trim()
      };
      if (!body.name || !body.student_no || !body.class_name) {
        alert('请填写完整信息');
        return;
      }
      const r = await fetch('/api/join', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify(body)
      });
      if (!r.ok) {
        alert(await r.text());
        return;
      }
      saveToStorage(body);
      location.href = '/quiz';
    });

    // ---------- init ----------
    checkSession();
  </script>
</body>
</html>
