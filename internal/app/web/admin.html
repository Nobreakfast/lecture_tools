<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理员面板</title>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)'], ['$', '$']] },
      chtml: { scale: 1 }
    };
    window.__mathJaxReady = new Promise((resolve, reject) => {
      const sources = [
        'https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js',
        'https://unpkg.com/mathjax@3/es5/tex-chtml.js',
        'https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.js'
      ];
      let idx = 0;
      const loadNext = () => {
        if (idx >= sources.length) {
          reject(new Error('mathjax load failed'));
          return;
        }
        const s = document.createElement('script');
        s.src = sources[idx++];
        s.defer = true;
        s.onload = () => resolve();
        s.onerror = () => loadNext();
        document.head.appendChild(s);
      };
      loadNext();
    });
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
  <script defer src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/python.min.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --success: #059669;
      --success-bg: #ecfdf5;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --warning: #d97706;
      --warning-bg: #fffbeb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      max-width: 760px;
      margin: 24px auto;
      padding: 0 12px;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }
    .card p { margin-bottom: 4px; }
    input, textarea, button {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 14px;
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      color: var(--text);
      background: var(--card-bg);
      transition: border-color .2s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }
    button {
      background: var(--primary);
      color: #fff;
      border: 0;
      cursor: pointer;
      font-weight: 500;
      transition: background .2s;
    }
    button:hover { background: var(--primary-hover); }
    textarea {
      min-height: 180px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      resize: vertical;
    }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin-top: 8px;
      font-size: 14px;
      background: var(--card-bg);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    thead { background: var(--bg); }
    th {
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:nth-child(even) { background: #f8fafc; }
    tbody tr:hover { background: #eef2ff; transition: background .15s; }
    .small { width: auto; display: inline-block; padding: 6px 12px; margin-right: 6px; border-radius: 8px; font-size: 13px; }
    .row { display: flex; gap: 8px; }
    .row button { margin-top: 8px; }
    .sortable { cursor: pointer; user-select: none; }
    .sortable:hover { color: var(--primary); }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.4;
    }
    .badge-warning {
      background: var(--warning-bg);
      color: var(--warning);
    }
    .badge-success {
      background: var(--success-bg);
      color: var(--success);
    }
    .badge-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    .score-bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .score-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      min-width: 40px;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width .3s;
    }
    .score-text {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }
    .btn-danger { background: var(--danger); }
    .btn-danger:hover { background: #b91c1c; }
    .btn-danger-dark { background: #7f1d1d; }
    .btn-danger-dark:hover { background: #651414; }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.6);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 50;
      opacity: 0;
      transition: opacity .2s;
    }
    .modal.show { display: flex; opacity: 1; }
    .modal-box {
      width: min(900px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 25px 50px rgba(0,0,0,.15);
    }
    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .meta p {
      margin: 0;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
    }
    .qitem {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 8px;
      line-height: 1.6;
    }
    .qimage { width: min(100%, 300px); border-radius: 8px; margin-top: 8px; border: 1px solid var(--border); }
    .good { color: var(--success); font-weight: 600; }
    .bad { color: var(--danger); font-weight: 600; }
    #loginCard {
      max-width: 380px;
      margin: 80px auto;
      text-align: center;
    }
    #loginCard p { margin-bottom: 8px; font-weight: 600; font-size: 16px; }
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .header-bar h2 { font-size: 20px; }
    pre.code-block {
      background: #f6f8fa;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      margin-top: 8px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.5;
    }
    pre.code-block code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .thumb-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .thumb-item {
      width: 100px;
      height: 100px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform .2s;
    }
    .thumb-item:hover { transform: scale(1.05); }
    .thumb-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      cursor: pointer;
    }
    .lightbox.show { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="header-bar">
    <h2>管理员页面</h2>
    <button id="shutdownBtn" class="small btn-danger-dark">安全退出服务</button>
  </div>
  <div class="card" id="loginCard">
    <p>请输入管理员密码</p>
    <input type="password" id="pwd" placeholder="管理员密码" />
    <button id="loginBtn">登录</button>
  </div>
  <div id="panel" style="display:none;">
    <div class="card">
      <p>入口状态：<strong id="entry">-</strong></p>
      <p>已进入：<strong id="started">0</strong>，已提交：<strong id="submitted">0</strong></p>
      <button id="openBtn">开启入口</button>
      <button id="closeBtn" class="btn-danger" style="margin-top:8px;">关闭入口</button>
    </div>
    <div class="card">
      <p>选择题库</p>
      <div class="row" style="margin-bottom:8px;">
        <select id="courseSelect" style="flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:var(--card-bg);color:var(--text);">
          <option value="">-- 选择课程 --</option>
        </select>
        <select id="quizSelect" style="flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:var(--card-bg);color:var(--text);">
          <option value="">-- 选择题库 --</option>
        </select>
      </div>
      <button id="loadServerQuiz">加载所选题库</button>
      <details style="margin-top:12px;">
        <summary style="cursor:pointer;color:var(--text-secondary);font-size:13px;">或手动上传/粘贴 YAML</summary>
        <textarea id="yaml" style="margin-top:8px;"></textarea>
        <input id="quizFile" type="file" accept=".yaml,.yml,text/yaml" style="display:none;" />
        <div class="row">
          <button id="pickQuiz">选择本地文件</button>
          <button id="loadQuiz">加载YAML文本</button>
        </div>
      </details>
    </div>
    <div class="card">
      <p>课后整理</p>
      <button id="exportBtn">导出全班 CSV</button>
      <button id="clearAttemptsBtn" class="btn-danger" style="margin-top:8px;">清空本次答题数据</button>
      <div id="attempts"></div>
    </div>
    <div class="card">
      <p>AI 总结状态</p>
      <button id="aiHealthBtn">刷新 AI 状态</button>
      <div id="aiHealth" style="margin-top:8px;font-size:14px;color:var(--text-secondary);"></div>
    </div>
    <div class="card">
      <p>AI 总结配置</p>
      <input id="aiEndpoint" placeholder="API Endpoint (如 https://api.openai.com/v1)" />
      <input id="aiKey" type="password" placeholder="API Key" />
      <input id="aiModel" placeholder="Model (如 gpt-4o-mini)" />
      <button id="saveAIConfigBtn" style="margin-top:8px;">保存 AI 配置</button>
    </div>
  </div>
  <div id="detailModal" class="modal">
    <div class="modal-box">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3>学生答题详情</h3>
        <button id="closeDetailBtn" class="small" style="margin-top:0;">关闭</button>
      </div>
      <div id="detail"></div>
    </div>
  </div>
  <div class="lightbox" id="imgLightbox" onclick="this.classList.remove('show')">
    <img id="imgLightboxImg" src="" />
  </div>
  <script>
    function escapeHTML(s) {
      return String(s || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }
    function openImgLightbox(src) {
      document.getElementById('imgLightboxImg').src = src;
      document.getElementById('imgLightbox').classList.add('show');
    }

    function looksLikePython(text) {
      if (!text) return false;
      return /(^|\n)\s*(def |class |import |from .+ import|for .+ in |while |if __name__|print\(|return |elif |except |try:|with )/.test(text);
    }

    function renderAnswerContent(text) {
      if (!text) return '未作答';
      if (looksLikePython(text)) {
        return `<pre class="code-block"><code class="language-python">${escapeHTML(text)}</code></pre>`;
      }
      return escapeHTML(text);
    }

    function renderImageThumbs(images) {
      if (!images || !images.length) return '';
      return '<div class="thumb-row">' + images.map((url, i) =>
        `<div class="thumb-item"><img src="${escapeHTML(url)}" /></div>`
      ).join('') + '</div>';
    }

    function optionText(q, key) {
      if (!key) return '未作答';
      if (q.is_multi) {
        const parts = String(key).split(',').map(s => s.trim()).filter(Boolean);
        if (!parts.length) return '未作答';
        return parts.map(k => {
          const found = (q.options || []).find(op => op.key === k);
          if (!found) return k;
          if (!found.text) return found.key;
          return `${found.key}. ${found.text}`;
        }).join('；');
      }
      const found = (q.options || []).find(op => op.key === key);
      if (!found) return key;
      if (!found.text) return found.key;
      const text = found.text || '';
      return `${found.key}. ${text}`.trim();
    }
    async function waitMathJax(timeoutMs = 8000) {
      const timeout = new Promise(resolve => setTimeout(resolve, timeoutMs));
      if (window.__mathJaxReady) {
        await Promise.race([window.__mathJaxReady.catch(() => null), timeout]);
      }
      if (window.MathJax && window.MathJax.startup && window.MathJax.startup.promise) {
        await Promise.race([window.MathJax.startup.promise.catch(() => null), timeout]);
      }
    }
    function scoreBarColor(ratio) {
      if (ratio >= 0.8) return 'var(--success)';
      if (ratio >= 0.5) return 'var(--warning)';
      return 'var(--danger)';
    }
    async function login() {
      const password = document.getElementById('pwd').value;
      const r = await fetch('/api/admin/login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        credentials:'include',
        body: JSON.stringify({ password })
      });
      if (!r.ok) {
        alert(await r.text());
        return;
      }
      document.getElementById('loginCard').style.display = 'none';
      document.getElementById('panel').style.display = 'block';
      refresh();
      loadAttempts();
      loadAIHealth();
      loadQuizFiles();
      listen();
    }
    async function toggle(open) {
      const r = await fetch('/api/admin/entry', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        credentials:'include',
        body: JSON.stringify({ open })
      });
      if (!r.ok) alert(await r.text());
      refresh();
    }
    let pickedYAML = '';
    let attemptsCache = [];
    let sortMode = 0;
    function scoreValue(item) {
      const total = Number(item.total || 0);
      const correct = Number(item.correct || 0);
      if (total <= 0) return -1;
      return correct / total;
    }
    function sortAttempts(items) {
      const withIndex = items.map((item, index) => ({ item, index }));
      if (sortMode === 1) {
        withIndex.sort((a, b) => {
          const sa = scoreValue(a.item);
          const sb = scoreValue(b.item);
          if (sb !== sa) return sb - sa;
          return a.index - b.index;
        });
      } else if (sortMode === 2) {
        withIndex.sort((a, b) => {
          const sa = scoreValue(a.item);
          const sb = scoreValue(b.item);
          if (sa !== sb) return sa - sb;
          return a.index - b.index;
        });
      }
      return withIndex.map(v => v.item);
    }
    function sortHint() {
      if (sortMode === 1) return '（分数高）';
      if (sortMode === 2) return '（分数低）';
      return '（时间顺序）';
    }
    function statusBadge(status) {
      if (status === 'submitted') return '<span class="badge badge-success"><span class="badge-dot"></span>已提交</span>';
      if (status === 'in_progress') return '<span class="badge badge-warning"><span class="badge-dot"></span>答题中</span>';
      return escapeHTML(status);
    }
    function renderAttempts() {
      const root = document.getElementById('attempts');
      const items = sortAttempts(attemptsCache || []);
      const rows = items.map(item => {
        const total = Number(item.total || 0);
        const correct = Number(item.correct || 0);
        const ratio = total > 0 ? correct / total : 0;
        const pct = total > 0 ? Math.round(ratio * 100) : 0;
        const barColor = scoreBarColor(ratio);
        return `
        <tr>
          <td>${escapeHTML(item.name)}</td>
          <td>${escapeHTML(item.student_no)}</td>
          <td>${escapeHTML(item.class_name)}</td>
          <td>${item.attempt_no ? `第${item.attempt_no}次` : '-'}</td>
          <td>${statusBadge(item.status)}</td>
          <td>
            <div class="score-bar-wrap">
              <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%;background:${barColor};"></div></div>
              <span class="score-text">${correct}/${total}</span>
            </div>
          </td>
          <td><button class="small" onclick="showDetail('${escapeHTML(item.id)}')">查看</button></td>
        </tr>
      `;
      }).join('');
      root.innerHTML = `<table><thead><tr><th>姓名</th><th>学号</th><th>班级</th><th>尝试</th><th>状态</th><th id="scoreSorter" class="sortable">得分${sortHint()}</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table>`;
      const sorter = document.getElementById('scoreSorter');
      if (sorter) sorter.onclick = toggleSortMode;
    }
    function toggleSortMode() {
      sortMode = (sortMode + 1) % 3;
      renderAttempts();
    }
    async function chooseQuizFile() {
      document.getElementById('quizFile').click();
    }
    async function loadQuiz() {
      const yamlBox = document.getElementById('yaml').value.trim();
      const yaml = pickedYAML || yamlBox;
      if (!yaml) {
        alert('请先选择文件或粘贴YAML内容');
        return;
      }
      const r = await fetch('/api/admin/load-quiz', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        credentials:'include',
        body: JSON.stringify({ yaml })
      });
      if (!r.ok) {
        alert(await r.text());
        return;
      }
      alert('题库加载成功');
      refresh();
      loadAttempts();
    }
    async function refresh() {
      const r = await fetch('/api/admin/state', { credentials:'include' });
      if (!r.ok) return;
      const data = await r.json();
      document.getElementById('entry').textContent = data.entry_open ? '开放' : '关闭';
      document.getElementById('started').textContent = data.started;
      document.getElementById('submitted').textContent = data.submitted;
    }
    async function loadAttempts() {
      const r = await fetch('/api/admin/attempts', { credentials:'include' });
      if (!r.ok) return;
      const data = await r.json();
      attemptsCache = data.items || [];
      renderAttempts();
    }
    async function showDetail(id) {
      const r = await fetch('/api/admin/attempt-detail?id=' + encodeURIComponent(id), { credentials:'include' });
      if (!r.ok) {
        alert(await r.text());
        return;
      }
      const data = await r.json();
      const html = data.questions.map((q, i) => {
        const image = q.image ? `<div><img class="qimage" src="/assets/${escapeHTML(q.image)}" /></div>` : '';
        const reference = q.reference ? `<div>参考答案：${escapeHTML(q.reference)}</div>` : '';
        const explanation = q.explanation ? `<div>解析：${escapeHTML(q.explanation)}</div>` : '';
        if (q.is_survey) {
          if (q.type === 'short_answer') {
            const ansContent = renderAnswerContent(q.answer);
            const imgThumbs = renderImageThumbs(q.answer_images);
            const refContent = q.reference ? `<div>参考答案：${looksLikePython(q.reference) ? `<pre class="code-block"><code class="language-python">${escapeHTML(q.reference)}</code></pre>` : escapeHTML(q.reference)}</div>` : '';
            return `<div class="qitem"><div><strong>${i+1}. ${escapeHTML(q.stem)}</strong></div>${image}<div>学生作答：${ansContent}</div>${imgThumbs}${refContent}${explanation}</div>`;
          }
          return `<div class="qitem"><div><strong>${i+1}. ${escapeHTML(q.stem)}</strong></div>${image}<div>学生作答：${escapeHTML(optionText(q, q.answer))}（沟通题）</div>${reference}${explanation}</div>`;
        }
        return `<div class="qitem"><div><strong>${i+1}. ${escapeHTML(q.stem)}</strong></div>${image}<div>学生选择：${escapeHTML(optionText(q, q.answer))}</div><div>正确答案：${escapeHTML(optionText(q, q.correct))}</div>${reference}${explanation}<div class="${q.is_correct ? 'good' : 'bad'}">${q.is_correct ? '回答正确' : '回答错误'}</div></div>`;
      }).join('');
      document.getElementById('detail').innerHTML = `
        <div class="meta">
          <p><strong>姓名：</strong>${escapeHTML(data.student.name)}</p>
          <p><strong>学号：</strong>${escapeHTML(data.student.student_no)}</p>
          <p><strong>班级：</strong>${escapeHTML(data.student.class_name)}</p>
          <p><strong>尝试：</strong>${data.student.attempt_no ? `第${data.student.attempt_no}次` : '-'}</p>
          <p><strong>得分：</strong>${data.score.correct}/${data.score.total}</p>
        </div>
        ${html}
      `;
      document.getElementById('detailModal').classList.add('show');
      document.body.style.overflow = 'hidden';
      await waitMathJax();
      if (window.MathJax && window.MathJax.typesetPromise) {
        await window.MathJax.typesetPromise([document.getElementById('detail')]);
      }
      if (window.hljs) {
        document.querySelectorAll('#detail pre.code-block code').forEach(el => hljs.highlightElement(el));
      }
      document.getElementById('detail').addEventListener('click', (e) => {
        const item = e.target.closest('.thumb-item');
        if (!item) return;
        const img = item.querySelector('img');
        if (img) openImgLightbox(img.src);
      });
    }
    function closeDetail() {
      document.getElementById('detailModal').classList.remove('show');
      document.body.style.overflow = '';
    }
    function exportCSV() {
      window.open('/api/admin/export-csv', '_blank');
    }
    async function loadAIHealth() {
      const r = await fetch('/api/admin/ai-health', { credentials:'include' });
      if (!r.ok) return;
      const d = await r.json();
      document.getElementById('aiHealth').innerHTML = `
        endpoint: ${escapeHTML(d.endpoint || '-')}<br/>
        model: ${escapeHTML(d.model || '-')}<br/>
        key_loaded: ${d.key_loaded ? 'true' : 'false'}<br/>
        last_success_at: ${escapeHTML(d.last_success_at || '-')}<br/>
        last_error: ${escapeHTML(d.last_error || '-')}
      `;
    }
    async function clearAttempts() {
      const ok = confirm('确认清空当前题库对应的全部学生答题记录？');
      if (!ok) return;
      const r = await fetch('/api/admin/clear-attempts', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        credentials: 'include',
        body: JSON.stringify({ confirm: true })
      });
      if (!r.ok) {
        alert(await r.text());
        return;
      }
      alert('已清空');
      loadAttempts();
      refresh();
    }
    async function shutdownService() {
      const ok = confirm('确认安全退出服务？退出后页面将不可访问。');
      if (!ok) return;
      const r = await fetch('/api/admin/shutdown', { method: 'POST', credentials: 'include' });
      if (!r.ok) {
        alert(await r.text());
        return;
      }
      alert('服务正在安全退出');
    }
    function listen() {
      const sse = new EventSource('/api/admin/live', { withCredentials: true });
      sse.onmessage = (evt) => {
        const d = JSON.parse(evt.data);
        document.getElementById('entry').textContent = d.entry_open ? '开放' : '关闭';
        document.getElementById('started').textContent = d.started;
        document.getElementById('submitted').textContent = d.submitted;
        loadAttempts();
      };
    }
    let quizFilesCache = [];
    async function loadQuizFiles() {
      try {
        const r = await fetch('/api/admin/quiz-files', { credentials:'include' });
        if (!r.ok) return;
        const data = await r.json();
        quizFilesCache = data.items || [];
        const courseSet = new Set(quizFilesCache.map(i => i.course));
        const cs = document.getElementById('courseSelect');
        cs.innerHTML = '<option value="">-- 选择课程 --</option>';
        for (const c of courseSet) {
          cs.innerHTML += `<option value="${escapeHTML(c)}">${escapeHTML(c)}</option>`;
        }
      } catch(e) {}
    }
    function updateQuizSelect() {
      const course = document.getElementById('courseSelect').value;
      const qs = document.getElementById('quizSelect');
      qs.innerHTML = '<option value="">-- 选择题库 --</option>';
      if (!course) return;
      const items = quizFilesCache.filter(i => i.course === course);
      for (const item of items) {
        qs.innerHTML += `<option value="${escapeHTML(item.path)}">${escapeHTML(item.file)}</option>`;
      }
    }
    async function loadServerQuiz() {
      const path = document.getElementById('quizSelect').value;
      if (!path) {
        alert('请先选择一个题库文件');
        return;
      }
      try {
        const r = await fetch('/api/admin/load-quiz', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          credentials: 'include',
          body: JSON.stringify({ file_path: path })
        });
        if (!r.ok) {
          alert(await r.text());
          return;
        }
        alert('题库加载成功');
        refresh();
        loadAttempts();
      } catch(e) {
        alert('加载失败');
      }
    }
    async function saveAIConfig() {
      const endpoint = document.getElementById('aiEndpoint').value.trim();
      const apiKey = document.getElementById('aiKey').value.trim();
      const model = document.getElementById('aiModel').value.trim();
      const r = await fetch('/api/admin/ai-config', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        credentials: 'include',
        body: JSON.stringify({ endpoint, api_key: apiKey, model })
      });
      if (!r.ok) {
        alert(await r.text());
        return;
      }
      alert('AI 配置已保存');
      loadAIHealth();
    }
    document.getElementById('loginBtn').onclick = login;
    document.getElementById('openBtn').onclick = () => toggle(true);
    document.getElementById('closeBtn').onclick = () => toggle(false);
    document.getElementById('pickQuiz').onclick = chooseQuizFile;
    document.getElementById('loadQuiz').onclick = loadQuiz;
    document.getElementById('exportBtn').onclick = exportCSV;
    document.getElementById('clearAttemptsBtn').onclick = clearAttempts;
    document.getElementById('shutdownBtn').onclick = shutdownService;
    document.getElementById('aiHealthBtn').onclick = loadAIHealth;
    document.getElementById('courseSelect').onchange = updateQuizSelect;
    document.getElementById('loadServerQuiz').onclick = loadServerQuiz;
    document.getElementById('saveAIConfigBtn').onclick = saveAIConfig;
    document.getElementById('closeDetailBtn').onclick = closeDetail;
    document.getElementById('detailModal').onclick = (evt) => {
      if (evt.target.id === 'detailModal') closeDetail();
    };
    document.getElementById('quizFile').onchange = async (evt) => {
      const file = evt.target.files && evt.target.files[0];
      if (!file) return;
      pickedYAML = await file.text();
      document.getElementById('yaml').value = pickedYAML;
    };
  </script>
</body>
</html>
