<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理员面板</title>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)'], ['$', '$']] },
      chtml: { scale: 1 }
    };
    window.__mathJaxReady = new Promise((resolve, reject) => {
      const sources = [
        'https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js',
        'https://unpkg.com/mathjax@3/es5/tex-chtml.js',
        'https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.js'
      ];
      let idx = 0;
      const loadNext = () => {
        if (idx >= sources.length) {
          reject(new Error('mathjax load failed'));
          return;
        }
        const s = document.createElement('script');
        s.src = sources[idx++];
        s.defer = true;
        s.onload = () => resolve();
        s.onerror = () => loadNext();
        document.head.appendChild(s);
      };
      loadNext();
    });
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
  <script defer src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/python.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --card-bg: rgba(255, 255, 255, 0.7);
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --text: #0f172a;
      --text-secondary: #475569;
      --border: rgba(226, 232, 240, 0.8);
      --radius: 16px;
      --shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05), 0 0 3px rgba(0, 0, 0, 0.02);
      --success: #059669;
      --success-bg: rgba(236, 253, 245, 0.8);
      --danger: #dc2626;
      --danger-bg: rgba(254, 242, 242, 0.8);
      --warning: #d97706;
      --warning-bg: rgba(255, 251, 235, 0.8);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      max-width: 760px;
      margin: 24px auto;
      padding: 0 12px;
      background: linear-gradient(135deg, #f6f8fd 0%, #f1f5f9 100%);
      min-height: 100vh;
      color: var(--text);
      line-height: 1.6;
    }
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px -4px rgba(0, 0, 0, 0.08), 0 4px 10px -2px rgba(0, 0, 0, 0.04);
    }
    .card p { margin-bottom: 4px; }
    input, textarea, button {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 14px;
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.9);
      transition: all 0.2s ease;
    }
    input:focus, textarea:focus {
      outline: none;
      background: #ffffff;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
    }
    button {
      background: linear-gradient(135deg, var(--primary) 0%, #6366f1 100%);
      color: #fff;
      border: 0;
      cursor: pointer;
      font-weight: 500;
      box-shadow: 0 2px 8px rgba(79, 70, 229, 0.2);
      transition: all 0.2s ease;
    }
    button:hover { 
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    }
    textarea {
      min-height: 180px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      resize: vertical;
    }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin-top: 8px;
      font-size: 14px;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: var(--shadow);
    }
    thead { background: var(--bg); }
    th {
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:nth-child(even) { background: #f8fafc; }
    tbody tr:hover { background: #eef2ff; transition: background .15s; }
    .small { width: auto; display: inline-block; padding: 6px 12px; margin-right: 6px; border-radius: 8px; font-size: 13px; }
    .row { display: flex; gap: 8px; }
    .row button { margin-top: 8px; }
    .sortable { cursor: pointer; user-select: none; }
    .sortable:hover { color: var(--primary); }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.4;
    }
    .badge-warning {
      background: var(--warning-bg);
      color: var(--warning);
    }
    .badge-success {
      background: var(--success-bg);
      color: var(--success);
    }
    .badge-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    .score-bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .score-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      min-width: 40px;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width .3s;
    }
    .score-text {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }
    .btn-danger { background: var(--danger); }
    .btn-danger:hover { background: #b91c1c; }
    .btn-danger-dark { background: #7f1d1d; }
    .btn-danger-dark:hover { background: #651414; }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.6);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 50;
      opacity: 0;
      transition: opacity .2s;
    }
    .modal.show { display: flex; opacity: 1; }
    .modal-box {
      width: min(900px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 25px 50px rgba(0,0,0,.15);
    }
    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .meta p {
      margin: 0;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
    }
    .qitem {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 8px;
      line-height: 1.6;
    }
    .qimage { width: min(100%, 300px); border-radius: 8px; margin-top: 8px; border: 1px solid var(--border); }
    .good { color: var(--success); font-weight: 600; }
    .bad { color: var(--danger); font-weight: 600; }
    #loginCard {
      max-width: 380px;
      margin: 80px auto;
      text-align: center;
    }
    #loginCard p { margin-bottom: 8px; font-weight: 600; font-size: 16px; }
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
      padding: 12px 0;
    }
    .header-bar h2 { font-size: 20px; }
    .tab-bar {
      display: flex;
      gap: 0;
      margin: 0 0 16px;
      border-bottom: 2px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      position: sticky;
      top: 56px;
      background: var(--bg);
      z-index: 9;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      width: auto;
      flex: 1;
      min-width: 0;
      padding: 10px 6px;
      margin: 0;
      border: none;
      border-radius: 10px 10px 0 0;
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      text-align: center;
      transition: color .2s, border-color .2s;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
    }
    .tab-btn:hover { color: var(--primary); background: transparent; }
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      background: transparent;
    }
    .tab-page { display: none; }
    .tab-page.active { display: block; }
    pre.code-block {
      background: #f6f8fa;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      margin-top: 8px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.5;
    }
    pre.code-block code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .thumb-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .thumb-item {
      width: 100px;
      height: 100px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform .2s;
    }
    .thumb-item:hover { transform: scale(1.05); }
    .thumb-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      cursor: pointer;
    }
    .lightbox.show { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
    }
    .stats-row {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }
    .stat-item {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      box-shadow: var(--shadow);
    }
    .stat-item.blue { border-left: 3px solid var(--primary); }
    .stat-item.green { border-left: 3px solid var(--success); }
    .stat-item-icon { font-size: 22px; }
    .stat-item-info { display: flex; flex-direction: column; }
    .stat-item-value {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
      font-variant-numeric: tabular-nums;
    }
    .stat-item.blue .stat-item-value { color: var(--primary); }
    .stat-item.green .stat-item-value { color: var(--success); }
    .stat-item-label { font-size: 12px; color: var(--text-secondary); }
    @keyframes statPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .stat-item.pulse { animation: statPulse 0.4s ease-out;
    }
    .bottom-stats-bar {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      margin-bottom: 24px;
      padding-top: 24px;
      border-top: 1px dashed var(--border);
      justify-content: center;
    }
    .bottom-stats-bar .stat-item {
      flex: 1;
      max-width: 360px;
      margin: 0;
      background: var(--card-bg);
      opacity: 0.9;
    }
    .bottom-stats-bar .stat-item:hover {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="header-bar">
    <h2>管理员页面</h2>
  </div>
  <div class="card" id="loginCard">
    <p>请输入管理员密码</p>
    <input type="password" id="pwd" placeholder="管理员密码" />
    <button id="loginBtn">登录</button>
  </div>
  <div id="panel" style="display:none;">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="tab-home">🏠 主页</button>
      <button class="tab-btn" data-tab="tab-students">📋 答题管理</button>
      <button class="tab-btn" data-tab="tab-summary">📊 班级总结</button>
      <button class="tab-btn" data-tab="tab-pdf">📄 课件管理</button>
      <button class="tab-btn" data-tab="tab-ai">⚙️ AI 配置</button>
    </div>
    <!-- Tab 1: 主页 -->
    <div class="tab-page active" id="tab-home">
      <div class="card">
        <p><strong>选择题库</strong></p>
        <div class="row" style="margin-bottom:8px;">
          <select id="courseSelect" style="flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:var(--card-bg);color:var(--text);">
            <option value="">-- 选择课程 --</option>
          </select>
          <select id="quizSelect" style="flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:var(--card-bg);color:var(--text);">
            <option value="">-- 选择题库 --</option>
          </select>
        </div>
        <button id="loadServerQuiz">加载所选题库</button>
        <details style="margin-top:12px;">
          <summary style="cursor:pointer;color:var(--text-secondary);font-size:13px;">或手动上传/粘贴 YAML</summary>
          <textarea id="yaml" style="margin-top:8px;"></textarea>
          <input id="quizFile" type="file" accept=".yaml,.yml,text/yaml" style="display:none;" />
          <div class="row">
            <button id="pickQuiz">选择本地文件</button>
            <button id="loadQuiz">加载YAML文本</button>
          </div>
        </details>
      </div>
      <div class="card">
        <p><strong>答题入口</strong></p>
        <p>入口状态：<strong id="entry">-</strong></p>
        <p>已进入：<strong id="started">0</strong>，已提交：<strong id="submitted">0</strong></p>
        <div class="row">
          <button id="openBtn">开启入口</button>
          <button id="closeBtn" class="btn-danger">关闭入口</button>
        </div>
      </div>
    </div>
    <!-- Tab 2: 答题管理 -->
    <div class="tab-page" id="tab-students">
      <div class="card">
        <p><strong>课后整理</strong></p>
        <div class="row">
          <button id="exportBtn">导出全班 CSV</button>
          <button id="clearAttemptsBtn" class="btn-danger">清空本次答题数据</button>
        </div>
        <div id="attempts"></div>
      </div>
    </div>
    <!-- Tab 3: 班级总结 -->
    <div class="tab-page" id="tab-summary">
      <div class="card">
        <p><strong>📊 班级 AI 总结</strong></p>
        <div class="row">
          <button id="genAdminSummaryBtn">生成班级 AI 总结</button>
          <button id="refreshAdminSummaryBtn" class="small" style="margin-top:8px;">刷新</button>
        </div>
        <div id="adminSummaryStatus" style="margin-top:6px;font-size:12px;color:var(--text-secondary);"></div>
        <div id="adminSummaryContent" style="margin-top:10px;display:none;">
          <div class="row" style="margin-bottom:10px;">
            <button id="copySummaryBtn" class="small" style="margin-top:0;">📋 复制总结</button>
            <button id="downloadSummaryMdBtn" class="small" style="margin-top:0;">⬇️ 下载 .md</button>
            <button id="downloadSummaryPdfBtn" class="small" style="margin-top:0;">📄 下载 PDF</button>
          </div>
          <div style="border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;background:var(--bg);">
            <p style="font-weight:600;margin-bottom:6px;">📝 答题情况与错题总结</p>
            <div id="adminAnswerAnalysis" style="font-size:14px;white-space:pre-wrap;line-height:1.7;"></div>
          </div>
          <div style="border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;background:var(--bg);">
            <p style="font-weight:600;margin-bottom:6px;">💬 学生反馈总结</p>
            <div id="adminFeedbackSummary" style="font-size:14px;white-space:pre-wrap;line-height:1.7;"></div>
          </div>
          <div style="border:1px solid var(--border);border-radius:10px;padding:12px;background:var(--bg);">
            <p style="font-weight:600;margin-bottom:6px;">💡 教学建议</p>
            <div id="adminTeachingSuggestions" style="font-size:14px;white-space:pre-wrap;line-height:1.7;"></div>
          </div>
        </div>
      </div>
    </div>
    <!-- Tab 4: 课件管理 -->
    <div class="tab-page" id="tab-pdf">
      <div class="card">
        <p><strong>📄 上传课件</strong></p>
        <div style="margin-bottom:8px;">
          <select id="pdfFolderSelect" style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:var(--card-bg);color:var(--text);margin-top:8px;">
            <option value="">-- 选择课程文件夹 --</option>
          </select>
          <input id="pdfFile" type="file" accept=".pdf" style="margin-top:4px;" />
          <button id="uploadPdfBtn" style="margin-top:8px;">上传 PDF</button>
        </div>
      </div>
      <div class="card">
        <p><strong>已上传课件</strong></p>
        <div id="pdfList"></div>
      </div>
    </div>
    <!-- Tab 5: AI 配置 -->
    <div class="tab-page" id="tab-ai">
      <div class="card">
        <p><strong>AI 服务状态</strong></p>
        <button id="aiHealthBtn">刷新 AI 状态</button>
        <div id="aiHealth" style="margin-top:8px;font-size:14px;color:var(--text-secondary);"></div>
      </div>
      <div class="card">
        <p><strong>AI 配置</strong></p>
        <input id="aiEndpoint" placeholder="API Endpoint (如 https://api.openai.com/v1)" />
        <input id="aiKey" type="password" placeholder="API Key" />
        <input id="aiModel" placeholder="Model (如 gpt-4o-mini)" />
        <button id="saveAIConfigBtn" style="margin-top:8px;">保存 AI 配置</button>
      </div>
    </div>

    <!-- 页面底部的统计栏 (类似 footnote) -->
    <div class="bottom-stats-bar" id="bottomStatsBar" style="display:none;">
      <div class="stat-item blue" id="statAttemptsCard">
        <div class="stat-item-icon">📝</div>
        <div class="stat-item-info">
          <div class="stat-item-value" id="statTotalAttempts">0</div>
          <div class="stat-item-label">历史总答题</div>
        </div>
      </div>
      <div class="stat-item green" id="statFeedbackCard">
        <div class="stat-item-icon">💬</div>
        <div class="stat-item-info">
          <div class="stat-item-value" id="statFeedbackCount">0</div>
          <div class="stat-item-label">学生反馈数</div>
        </div>
      </div>
    </div>
  </div>
  <div id="detailModal" class="modal">
    <div class="modal-box">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3>学生答题详情</h3>
        <button id="closeDetailBtn" class="small" style="margin-top:0;">关闭</button>
      </div>
      <div id="detail"></div>
    </div>
  </div>
  <div class="lightbox" id="imgLightbox" onclick="this.classList.remove('show')">
    <img id="imgLightboxImg" src="" />
  </div>
  <script>
    function escapeHTML(s) {
      return String(s || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }
    function openImgLightbox(src) {
      document.getElementById('imgLightboxImg').src = src;
      document.getElementById('imgLightbox').classList.add('show');
    }

    function looksLikePython(text) {
      if (!text) return false;
      return /(^|\n)\s*(def |class |import |from .+ import|for .+ in |while |if __name__|print\(|return |elif |except |try:|with )/.test(text);
    }

    function renderAnswerContent(text) {
      if (!text) return '未作答';
      if (looksLikePython(text)) {
        return `<pre class="code-block"><code class="language-python">${escapeHTML(text)}</code></pre>`;
      }
      return escapeHTML(text);
    }

    function renderImageThumbs(images) {
      if (!images || !images.length) return '';
      return '<div class="thumb-row">' + images.map((url, i) =>
        `<div class="thumb-item"><img src="${escapeHTML(url)}" /></div>`
      ).join('') + '</div>';
    }

    function optionText(q, key) {
      if (!key) return '未作答';
      if (q.is_multi) {
        const parts = String(key).split(',').map(s => s.trim()).filter(Boolean);
        if (!parts.length) return '未作答';
        return parts.map(k => {
          const found = (q.options || []).find(op => op.key === k);
          if (!found) return k;
          if (!found.text) return found.key;
          return `${found.key}. ${found.text}`;
        }).join('；');
      }
      const found = (q.options || []).find(op => op.key === key);
      if (!found) return key;
      if (!found.text) return found.key;
      const text = found.text || '';
      return `${found.key}. ${text}`.trim();
    }
    async function waitMathJax(timeoutMs = 8000) {

    let pickedYAML = '';

    let sortMode = 0;
    function scoreValue(item) {
      const total = Number(item.total || 0);
      const correct = Number(item.correct || 0);
      if (total <= 0) return -1;
      return correct / total;
    }
    function sortAttempts(items) {
      const withIndex = items.map((item, index) => ({ item, index }));
      if (sortMode === 1) {
        withIndex.sort((a, b) => {
          const sa = scoreValue(a.item);
          const sb = scoreValue(b.item);
          if (sb !== sa) return sb - sa;
          return a.index - b.index;
        });
      } else if (sortMode === 2) {
        withIndex.sort((a, b) => {
          const sa = scoreValue(a.item);
          const sb = scoreValue(b.item);
          if (sa !== sb) return sa - sb;
          return a.index - b.index;
        });
      }
      return withIndex.map(v => v.item);
    }
    function sortHint() {
      if (sortMode === 1) return '（分数高）';
      if (sortMode === 2) return '（分数低）';
      return '（时间顺序）';

    function buildPDFWithJPEG(jpegBytes, imgW, imgH) {
      const encoder = new TextEncoder();
      const parts = [];
      const offsets = [0];
      let pos = 0;
      const pushText = (s) => { const d = encoder.encode(s); parts.push(d); pos += d.length; };
      const pushBytes = (b) => { parts.push(b); pos += b.length; };
      const pageW = 595.28, pageH = 841.89;
      let drawW = pageW - 40;
      let drawH = drawW * imgH / imgW;
      if (drawH > pageH - 40) { drawH = pageH - 40; drawW = drawH * imgW / imgH; }
      const x = (pageW - drawW) / 2, y = pageH - 20 - drawH;
      const content = `q\n${drawW.toFixed(2)} 0 0 ${drawH.toFixed(2)} ${x.toFixed(2)} ${y.toFixed(2)} cm\n/Im0 Do\nQ\n`;
      pushText('%PDF-1.4\n%\xE2\xE3\xCF\xD3\n');
      offsets.push(pos); pushText('1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n');
      offsets.push(pos); pushText('2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n');
      offsets.push(pos); pushText(`3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageW.toFixed(2)} ${pageH.toFixed(2)}] /Resources 6 0 R /Contents 5 0 R >>\nendobj\n`);
      offsets.push(pos); pushText(`4 0 obj\n<< /Type /XObject /Subtype /Image /Width ${imgW} /Height ${imgH} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpegBytes.length} >>\nstream\n`); pushBytes(jpegBytes); pushText('\nendstream\nendobj\n');
      const contentBytes = encoder.encode(content);
      offsets.push(pos); pushText(`5 0 obj\n<< /Length ${contentBytes.length} >>\nstream\n${content}endstream\nendobj\n`);
      offsets.push(pos); pushText('6 0 obj\n<< /XObject << /Im0 4 0 R >> >>\nendobj\n');
      const xrefPos = pos;
      pushText('xref\n0 7\n');
      pushText('0000000000 65535 f \n');
      for (let i = 1; i <= 6; i++) pushText(String(offsets[i]).padStart(10, '0') + ' 00000 n \n');
      pushText(`trailer\n<< /Size 7 /Root 1 0 R >>\nstartxref\n${xrefPos}\n%%EOF`);
      return new Blob(parts, { type: 'application/pdf' });
    }
    document.getElementById('downloadSummaryPdfBtn').onclick = async () => {
      if (!adminSummaryData || !adminSummaryData.summary) return;
      const btn = document.getElementById('downloadSummaryPdfBtn');
      btn.disabled = true;
      btn.textContent = '生成中...';
      try {
        if (!window.html2canvas) { alert('PDF 组件加载中，请稍后重试'); return; }
        const el = document.getElementById('adminSummaryContent');
        const canvas = await window.html2canvas(el, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
        const jpeg = toUint8(canvas.toDataURL('image/jpeg', 0.92));
        const pdf = buildPDFWithJPEG(jpeg, canvas.width, canvas.height);
        downloadBlob(pdf, summaryFileName('.pdf'));
      } catch (e) {
        alert('PDF 导出失败，请重试');
      } finally {
        btn.disabled = false;
        btn.textContent = '📄 下载 PDF';
      }
    };
    document.getElementById('loginBtn').onclick = login;
    document.getElementById('openBtn').onclick = () => toggle(true);
    document.getElementById('closeBtn').onclick = () => toggle(false);
    document.getElementById('pickQuiz').onclick = chooseQuizFile;
    document.getElementById('loadQuiz').onclick = loadQuiz;
    document.getElementById('exportBtn').onclick = exportCSV;
    document.getElementById('clearAttemptsBtn').onclick = clearAttempts;
    document.getElementById('aiHealthBtn').onclick = loadAIHealth;
    document.getElementById('courseSelect').onchange = updateQuizSelect;
    document.getElementById('loadServerQuiz').onclick = loadServerQuiz;
    document.getElementById('saveAIConfigBtn').onclick = saveAIConfig;
    document.getElementById('genAdminSummaryBtn').onclick = genAdminSummary;
    document.getElementById('refreshAdminSummaryBtn').onclick = loadAdminSummary;
    document.getElementById('uploadPdfBtn').onclick = uploadPDF;
    document.getElementById('closeDetailBtn').onclick = closeDetail;
    document.getElementById('detailModal').onclick = (evt) => {
      if (evt.target.id === 'detailModal') closeDetail();
    };
    document.getElementById('quizFile').onchange = async (evt) => {
      const file = evt.target.files && evt.target.files[0];
      if (!file) return;
      pickedYAML = await file.text();
      document.getElementById('yaml').value = pickedYAML;
    };
  </script>
