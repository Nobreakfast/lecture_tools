<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理员面板</title>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)'], ['$', '$']] },
      chtml: { scale: 1 }
    };
    window.__mathJaxReady = new Promise((resolve, reject) => {
      const sources = [
        'https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js',
        'https://unpkg.com/mathjax@3/es5/tex-chtml.js',
        'https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.js'
      ];
      let idx = 0;
      const loadNext = () => {
        if (idx >= sources.length) {
          reject(new Error('mathjax load failed'));
          return;
        }
        const s = document.createElement('script');
        s.src = sources[idx++];
        s.defer = true;
        s.onload = () => resolve();
        s.onerror = () => loadNext();
        document.head.appendChild(s);
      };
      loadNext();
    });
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
  <script defer src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/python.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --card-bg: rgba(255, 255, 255, 0.7);
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --text: #0f172a;
      --text-secondary: #475569;
      --border: rgba(226, 232, 240, 0.8);
      --radius: 16px;
      --shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05), 0 0 3px rgba(0, 0, 0, 0.02);
      --success: #059669;
      --success-bg: rgba(236, 253, 245, 0.8);
      --danger: #dc2626;
      --danger-bg: rgba(254, 242, 242, 0.8);
      --warning: #d97706;
      --warning-bg: rgba(255, 251, 235, 0.8);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      max-width: 760px;
      margin: 24px auto;
      padding: 0 12px;
      background: linear-gradient(135deg, #f6f8fd 0%, #f1f5f9 100%);
      min-height: 100vh;
      color: var(--text);
      line-height: 1.6;
    }
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px -4px rgba(0, 0, 0, 0.08), 0 4px 10px -2px rgba(0, 0, 0, 0.04);
    }
    .card p { margin-bottom: 4px; }
    input, textarea, button {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 14px;
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.9);
      transition: all 0.2s ease;
    }
    input:focus, textarea:focus {
      outline: none;
      background: #ffffff;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
    }
    button {
      background: linear-gradient(135deg, var(--primary) 0%, #6366f1 100%);
      color: #fff;
      border: 0;
      cursor: pointer;
      font-weight: 500;
      box-shadow: 0 2px 8px rgba(79, 70, 229, 0.2);
      transition: all 0.2s ease;
    }
    button:hover { 
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    }
    textarea {
      min-height: 180px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      resize: vertical;
    }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin-top: 8px;
      font-size: 14px;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: var(--shadow);
    }
    thead { background: var(--bg); }
    th {
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:nth-child(even) { background: #f8fafc; }
    tbody tr:hover { background: #eef2ff; transition: background .15s; }
    .small { width: auto; display: inline-block; padding: 6px 12px; margin-right: 6px; border-radius: 8px; font-size: 13px; }
    .row { display: flex; gap: 8px; }
    .row button { margin-top: 8px; }
    .sortable { cursor: pointer; user-select: none; }
    .sortable:hover { color: var(--primary); }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.4;
    }
    .badge-warning {
      background: var(--warning-bg);
      color: var(--warning);
    }
    .badge-success {
      background: var(--success-bg);
      color: var(--success);
    }
    .badge-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    .score-bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .score-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      min-width: 40px;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width .3s;
    }
    .score-text {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }
    .btn-danger { background: var(--danger); }
    .btn-danger:hover { background: #b91c1c; }
    .btn-danger-dark { background: #7f1d1d; }
    .btn-danger-dark:hover { background: #651414; }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.6);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 50;
      opacity: 0;
      transition: opacity .2s;
    }
    .modal.show { display: flex; opacity: 1; }
    .modal-box {
      width: min(900px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: rgba(255, 255, 255, 0.96);
      border-radius: var(--radius);
      padding: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 25px 50px rgba(0,0,0,.15);
    }
    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .meta p {
      margin: 0;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
    }
    .qitem {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 8px;
      line-height: 1.6;
      background: rgba(255, 255, 255, 0.98);
    }
    .qimage { width: min(100%, 300px); border-radius: 8px; margin-top: 8px; border: 1px solid var(--border); }
    .good { color: var(--success); font-weight: 600; }
    .bad { color: var(--danger); font-weight: 600; }
    #loginCard {
      max-width: 380px;
      margin: 80px auto;
      text-align: center;
    }
    #loginCard p { margin-bottom: 8px; font-weight: 600; font-size: 16px; }
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
      padding: 12px 0;
    }
    .header-bar h2 { font-size: 20px; }
    .tab-bar {
      display: flex;
      gap: 0;
      margin: 0 0 16px;
      border-bottom: 2px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      position: sticky;
      top: 56px;
      background: var(--bg);
      z-index: 9;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      width: auto;
      flex: 1;
      min-width: 0;
      padding: 10px 6px;
      margin: 0;
      border: none;
      border-radius: 10px 10px 0 0;
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      text-align: center;
      transition: color .2s, border-color .2s;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
    }
    .tab-btn:hover { color: var(--primary); background: transparent; }
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      background: transparent;
    }
    .tab-page { display: none; }
    .tab-page.active { display: block; }
    pre.code-block {
      background: #f6f8fa;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      margin-top: 8px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.5;
    }
    pre.code-block code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .thumb-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .thumb-item {
      width: 100px;
      height: 100px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform .2s;
    }
    .thumb-item:hover { transform: scale(1.05); }
    .thumb-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      cursor: pointer;
    }
    .lightbox.show { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
    }
    .stats-row {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }
    .stat-item {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      box-shadow: var(--shadow);
    }
    .stat-item.blue { border-left: 3px solid var(--primary); }
    .stat-item.green { border-left: 3px solid var(--success); }
    .stat-item-icon { font-size: 22px; }
    .stat-item-info { display: flex; flex-direction: column; }
    .stat-item-value {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
      font-variant-numeric: tabular-nums;
    }
    .stat-item.blue .stat-item-value { color: var(--primary); }
    .stat-item.green .stat-item-value { color: var(--success); }
    .stat-item-label { font-size: 12px; color: var(--text-secondary); }
    @keyframes statPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .stat-item.pulse { animation: statPulse 0.4s ease-out;
    }
    .bottom-stats-bar {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      margin-bottom: 24px;
      padding-top: 24px;
      border-top: 1px dashed var(--border);
      justify-content: center;
    }
    .bottom-stats-bar .stat-item {
      flex: 1;
      max-width: 360px;
      margin: 0;
      background: var(--card-bg);
      opacity: 0.9;
    }
    .bottom-stats-bar .stat-item:hover {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="header-bar">
    <h2>管理员页面</h2>
  </div>
  <div class="card" id="loginCard">
    <p>请输入管理员密码</p>
    <input type="password" id="pwd" placeholder="管理员密码" />
    <button id="loginBtn">登录</button>
  </div>
  <div id="panel" style="display:none;">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="tab-home">🏠 主页</button>
      <button class="tab-btn" data-tab="tab-students">📋 答题管理</button>
      <button class="tab-btn" data-tab="tab-summary">📊 班级总结</button>
      <button class="tab-btn" data-tab="tab-homework">🧾 作业提交</button>
    <button class="tab-btn" data-tab="tab-pdf">📦 材料管理</button>
      <button class="tab-btn" data-tab="tab-ai">⚙️ AI 配置</button>
    </div>
    <!-- Tab 1: 主页 -->
    <div class="tab-page active" id="tab-home">
      <div class="card">
        <p><strong>选择题库</strong></p>
        <div class="row" style="margin-bottom:8px;">
          <select id="courseSelect" style="flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:var(--card-bg);color:var(--text);">
            <option value="">-- 选择课程 --</option>
          </select>
          <select id="quizSelect" style="flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:var(--card-bg);color:var(--text);">
            <option value="">-- 选择题库 --</option>
          </select>
        </div>
        <button id="loadServerQuiz">加载所选题库</button>
        <details style="margin-top:12px;">
          <summary style="cursor:pointer;color:var(--text-secondary);font-size:13px;">或手动上传/粘贴 YAML</summary>
          <textarea id="yaml" style="margin-top:8px;"></textarea>
          <input id="quizFile" type="file" accept=".yaml,.yml,text/yaml" style="display:none;" />
          <div class="row">
            <button id="pickQuiz">选择本地文件</button>
            <button id="loadQuiz">加载YAML文本</button>
          </div>
        </details>
      </div>
      <div class="card">
        <p><strong>答题入口</strong></p>
        <p>入口状态：<strong id="entry">-</strong></p>
        <p>已进入：<strong id="started">0</strong>，已提交：<strong id="submitted">0</strong></p>
        <div class="row">
          <button id="openBtn">开启入口</button>
          <button id="closeBtn" class="btn-danger">关闭入口</button>
        </div>
      </div>
    </div>
    <!-- Tab 2: 答题管理 -->
    <div class="tab-page" id="tab-students">
      <div class="card">
        <p><strong>课后整理</strong></p>
        <div class="row">
          <button id="exportBtn">导出全班 CSV</button>
          <button id="clearAttemptsBtn" class="btn-danger">清空本次答题数据</button>
        </div>
        <div id="attempts"></div>
      </div>
    </div>
    <!-- Tab 3: 班级总结 -->
    <div class="tab-page" id="tab-summary">
      <div class="card">
        <p><strong>📊 班级 AI 总结</strong></p>
        <div class="row">
          <button id="genAdminSummaryBtn">生成班级 AI 总结</button>
          <button id="refreshAdminSummaryBtn" class="small" style="margin-top:8px;">刷新</button>
        </div>
        <div id="adminSummaryStatus" style="margin-top:6px;font-size:12px;color:var(--text-secondary);"></div>
        <div id="adminSummaryContent" style="margin-top:10px;display:none;">
          <div class="row" style="margin-bottom:10px;">
            <button id="copySummaryBtn" class="small" style="margin-top:0;">📋 复制总结</button>
            <button id="downloadSummaryMdBtn" class="small" style="margin-top:0;">⬇️ 下载 .md</button>
            <button id="downloadSummaryPdfBtn" class="small" style="margin-top:0;">📄 下载 PDF</button>
          </div>
          <div style="border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;background:var(--bg);">
            <p style="font-weight:600;margin-bottom:6px;">📝 答题情况与错题总结</p>
            <div id="adminAnswerAnalysis" style="font-size:14px;white-space:pre-wrap;line-height:1.7;"></div>
          </div>
          <div style="border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;background:var(--bg);">
            <p style="font-weight:600;margin-bottom:6px;">💬 学生反馈总结</p>
            <div id="adminFeedbackSummary" style="font-size:14px;white-space:pre-wrap;line-height:1.7;"></div>
          </div>
          <div style="border:1px solid var(--border);border-radius:10px;padding:12px;background:var(--bg);">
            <p style="font-weight:600;margin-bottom:6px;">💡 教学建议</p>
            <div id="adminTeachingSuggestions" style="font-size:14px;white-space:pre-wrap;line-height:1.7;"></div>
          </div>
        </div>
      </div>
    </div>
    <!-- Tab 4: 作业提交 -->
    <div class="tab-page" id="tab-homework">
      <div class="card">
        <p><strong>🧾 作业文件包管理</strong></p>
        <div class="row" style="margin-top:8px;align-items:flex-end;flex-wrap:wrap;">
          <div style="flex:1;min-width:220px;">
            <div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px;">课程</div>
            <select id="homeworkCourseSelect" style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:var(--card-bg);color:var(--text);margin-top:0;">
              <option value="">-- 选择课程 --</option>
            </select>
          </div>
          <div style="flex:1;min-width:220px;">
            <div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px;">作业编号</div>
            <input id="homeworkAssignmentIdInput" placeholder="例如 task_1" style="margin-top:0;" />
          </div>
          <div style="flex:1;min-width:220px;">
            <div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px;">上传作业文件（PDF / .npy / .py / .zip / .ipynb 等）</div>
            <input id="homeworkAssignmentFiles" type="file" multiple style="margin-top:0;" />
          </div>
          <button id="uploadHomeworkAssignmentBtn" class="small" style="margin-top:0;">上传作业文件</button>
        </div>
        <div id="homeworkAssignmentResults" style="margin-top:8px;font-size:13px;color:var(--text-secondary);"></div>
      </div>
      <div class="card">
        <p><strong>已启用作业</strong></p>
        <div id="homeworkAssignmentsList"></div>
      </div>
      <div class="card">
        <p><strong>学生提交列表</strong></p>
        <div class="row" style="margin-top:8px;align-items:flex-end;flex-wrap:wrap;">
          <div style="flex:1;min-width:220px;">
            <div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px;">课程筛选</div>
            <select id="homeworkSubmissionCourseSelect" style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:var(--card-bg);color:var(--text);margin-top:0;">
              <option value="">-- 全部课程 --</option>
            </select>
          </div>
          <div style="flex:1;min-width:220px;">
            <div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px;">作业编号筛选</div>
            <select id="homeworkAssignmentFilter" style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:var(--card-bg);color:var(--text);margin-top:0;">
              <option value="">-- 全部作业 --</option>
            </select>
          </div>
          <button id="downloadHomeworkBulkBtn" class="small" style="margin-top:0;background:#0f766e;">下载本次全部作业</button>
          <button id="refreshHomeworkBtn" class="small" style="margin-top:0;">刷新提交列表</button>
        </div>
        <div id="homeworkList" style="margin-top:12px;"></div>
      </div>
    </div>
    <!-- Tab 5: 材料管理 -->
    <div class="tab-page" id="tab-pdf">
      <div class="card">
        <p><strong>📄 上传材料</strong></p>
        <div style="margin-bottom:8px;">
          <select id="pdfFolderSelect" style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:var(--card-bg);color:var(--text);margin-top:8px;">
            <option value="">-- 选择课程文件夹 --</option>
          </select>
          <input id="pdfFile" type="file" accept=".pdf,.ipynb,.zip,.npy" multiple style="margin-top:4px;" />
          <button id="uploadPdfBtn" style="margin-top:8px;">批量上传材料</button>
          <div id="uploadResults" style="margin-top:8px;font-size:13px;color:var(--text-secondary);"></div>
        </div>
      </div>
      <div class="card">
        <p><strong>已上传材料</strong></p>
        <div id="pdfList"></div>
      </div>
    </div>
    <!-- Tab 6: AI 配置 -->
    <div class="tab-page" id="tab-ai">
      <div class="card">
        <p><strong>AI 服务状态</strong></p>
        <button id="aiHealthBtn">刷新 AI 状态</button>
        <div id="aiHealth" style="margin-top:8px;font-size:14px;color:var(--text-secondary);"></div>
      </div>
      <div class="card">
        <p><strong>AI 配置</strong></p>
        <input id="aiEndpoint" placeholder="API Endpoint (如 https://api.openai.com/v1)" />

    <!-- 页面底部的统计栏 (类似 footnote) -->

      <div class="stat-item blue" id="statAttemptsCard">

  <div id="detailModal" class="modal">
    <div class="modal-box">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 id="detailTitle">学生答题详情</h3>

  <div class="lightbox" id="imgLightbox" onclick="this.classList.remove('show')">
    <img id="imgLightboxImg" src="" />
  </div>
  <script>
    function escapeHTML(s) {
      return String(s || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }
    function openImgLightbox(src) {
      document.getElementById('imgLightboxImg').src = src;
      document.getElementById('imgLightbox').classList.add('show');
    }

    function looksLikePython(text) {
      if (!text) return false;
      return /(^|\n)\s*(def |class |import |from .+ import|for .+ in |while |if __name__|print\(|return |elif |except |try:|with )/.test(text);
    }

    function renderAnswerContent(text) {
      if (!text) return '未作答';
      if (looksLikePython(text)) {
        return `<pre class="code-block"><code class="language-python">${escapeHTML(text)}</code></pre>`;
      }
      return escapeHTML(text);
    }

    function renderImageThumbs(images) {
      if (!images || !images.length) return '';
      return '<div class="thumb-row">' + images.map((url, i) =>
        `<div class="thumb-item"><img src="${escapeHTML(url)}" /></div>`
      ).join('') + '</div>';
    }

    function optionText(q, key) {
      if (!key) return '未作答';
      if (q.is_multi) {
        const parts = String(key).split(',').map(s => s.trim()).filter(Boolean);
        if (!parts.length) return '未作答';
        return parts.map(k => {
          const found = (q.options || []).find(op => op.key === k);
          if (!found) return k;
          if (!found.text) return found.key;
          return `${found.key}. ${found.text}`;
        }).join('；');
      }
      const found = (q.options || []).find(op => op.key === key);
      if (!found) return key;
      if (!found.text) return found.key;
      const text = found.text || '';
      return `${found.key}. ${text}`.trim();
    }
    async function waitMathJax(timeoutMs = 8000) {
      const timeout = new Promise(resolve => setTimeout(resolve, timeoutMs));
      if (window.__mathJaxReady) {
        await Promise.race([window.__mathJaxReady.catch(() => null), timeout]);
      }
      if (window.MathJax && window.MathJax.startup && window.MathJax.startup.promise) {
        await Promise.race([window.MathJax.startup.promise.catch(() => null), timeout]);
      }
    }
    function scoreBarColor(ratio) {
      if (ratio >= 0.8) return 'var(--success)';
      if (ratio >= 0.5) return 'var(--warning)';
      return 'var(--danger)';
    }
    async function login() {
      const password = document.getElementById('pwd').value;
      const r = await fetch('/api/admin/login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        credentials:'include',
        body: JSON.stringify({ password })
      });
      if (!r.ok) {
        alert(await r.text());
        return;
      }
      document.getElementById('loginCard').style.display = 'none';
      document.getElementById('panel').style.display = 'block';
      document.getElementById('bottomStatsBar').style.display = 'flex';
      refresh();
      loadAttempts();
      loadAIHealth();
      loadQuizFiles();
      loadAdminSummary();
      loadPDFList();
      loadHomeworkAssignments();
      loadHomeworkSubmissions();
      listen();
    }
    async function toggle(open) {
      const r = await fetch('/api/admin/entry', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        credentials:'include',
        body: JSON.stringify({ open })
      });
      if (!r.ok) alert(await r.text());
      refresh();
    }
    let pickedYAML = '';
    let attemptsCache = [];
    let homeworkCache = [];
    let homeworkAssignmentsCache = [];
    let sortMode = 0;
    function scoreValue(item) {
      const total = Number(item.total || 0);
      const correct = Number(item.correct || 0);
      if (total <= 0) return -1;
      return correct / total;
    }
    function sortAttempts(items) {
      const withIndex = items.map((item, index) => ({ item, index }));
      if (sortMode === 1) {
        withIndex.sort((a, b) => {
          const sa = scoreValue(a.item);
          const sb = scoreValue(b.item);
          if (sb !== sa) return sb - sa;
          return a.index - b.index;
        });
      } else if (sortMode === 2) {
        withIndex.sort((a, b) => {
          const sa = scoreValue(a.item);
          const sb = scoreValue(b.item);
          if (sa !== sb) return sa - sb;
          return a.index - b.index;
        });
      }
      return withIndex.map(v => v.item);
    }
    function sortHint() {
      if (sortMode === 1) return '（分数高）';
      if (sortMode === 2) return '（分数低）';
      return '（时间顺序）';
    }
    function statusBadge(status) {
      if (status === 'submitted') return '<span class="badge badge-success"><span class="badge-dot"></span>已提交</span>';
      if (status === 'in_progress') return '<span class="badge badge-warning"><span class="badge-dot"></span>答题中</span>';
      return escapeHTML(status);
    }
    function renderAttempts() {
      const root = document.getElementById('attempts');
      const items = sortAttempts(attemptsCache || []);
      const rows = items.map(item => {
        const total = Number(item.total || 0);
        const correct = Number(item.correct || 0);
        const ratio = total > 0 ? correct / total : 0;
        const pct = total > 0 ? Math.round(ratio * 100) : 0;
        const barColor = scoreBarColor(ratio);
        return `
        <tr>
          <td>${escapeHTML(item.name)}</td>
          <td>${escapeHTML(item.student_no)}</td>
          <td>${escapeHTML(item.class_name)}</td>
          <td>${item.attempt_no ? `第${item.attempt_no}次` : '-'}</td>
          <td>${statusBadge(item.status)}</td>
          <td>
            <div class="score-bar-wrap">
              <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%;background:${barColor};"></div></div>
              <span class="score-text">${correct}/${total}</span>
            </div>
          </td>
          <td><button class="small" onclick="showDetail('${escapeHTML(item.id)}')">查看</button></td>
        </tr>
      `;
      }).join('');
      root.innerHTML = `<table><thead><tr><th>姓名</th><th>学号</th><th>班级</th><th>尝试</th><th>状态</th><th id="scoreSorter" class="sortable">得分${sortHint()}</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table>`;
      const sorter = document.getElementById('scoreSorter');
      if (sorter) sorter.onclick = toggleSortMode;
    }
    function toggleSortMode() {
      sortMode = (sortMode + 1) % 3;
      renderAttempts();
    }
    async function chooseQuizFile() {
      document.getElementById('quizFile').click();
    }
    async function loadQuiz() {
      const yamlBox = document.getElementById('yaml').value.trim();
      const yaml = pickedYAML || yamlBox;
      if (!yaml) {
        alert('请先选择文件或粘贴YAML内容');
        return;
      }
      const r = await fetch('/api/admin/load-quiz', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        credentials:'include',
        body: JSON.stringify({ yaml })
      });
      if (!r.ok) {
        alert(await r.text());
        return;
      }
      alert('题库加载成功');
      refresh();
      loadAttempts();
      loadAdminSummary();
    }
    async function refresh() {
      const r = await fetch('/api/admin/state', { credentials:'include' });
      if (!r.ok) return;
      const data = await r.json();
      document.getElementById('entry').textContent = data.entry_open ? '开放' : '关闭';
      document.getElementById('started').textContent = data.started;
      document.getElementById('submitted').textContent = data.submitted;
      const newAttempts = data.total_attempts ?? 0;
      const newFeedback = data.feedback_count ?? 0;
      const attemptsEl = document.getElementById('statTotalAttempts');
      const feedbackEl = document.getElementById('statFeedbackCount');
      const prevAttempts = Number(attemptsEl.textContent) || 0;
      const prevFeedback = Number(feedbackEl.textContent) || 0;
      attemptsEl.textContent = newAttempts;
      feedbackEl.textContent = newFeedback;
      if (newAttempts !== prevAttempts) {
        const card = document.getElementById('statAttemptsCard');
        card.classList.remove('pulse');
        void card.offsetWidth;
        card.classList.add('pulse');
      }
      if (newFeedback !== prevFeedback) {
        const card = document.getElementById('statFeedbackCard');
        card.classList.remove('pulse');
        void card.offsetWidth;
        card.classList.add('pulse');
      }
    }
    async function loadAttempts() {
      const r = await fetch('/api/admin/attempts', { credentials:'include' });
      if (!r.ok) return;
      const data = await r.json();
      attemptsCache = data.items || [];
      renderAttempts();
    }
    function syncHomeworkCourseOptions(extraCourses = []) {
      const courseSet = new Set([...(quizFilesCache || []).map(i => i.course), ...extraCourses]);
      const courseSelect = document.getElementById('homeworkCourseSelect');
      const submissionCourseSelect = document.getElementById('homeworkSubmissionCourseSelect');
      const currentUploadCourse = courseSelect ? courseSelect.value : '';
      const currentSubmissionCourse = submissionCourseSelect ? submissionCourseSelect.value : '';
      if (courseSelect) {
        courseSelect.innerHTML = '<option value="">-- 选择课程 --</option>';
        Array.from(courseSet).sort().forEach(course => {
          courseSelect.innerHTML += `<option value="${escapeHTML(course)}">${escapeHTML(course)}</option>`;
        });
        if (currentUploadCourse) courseSelect.value = currentUploadCourse;
      }
      if (submissionCourseSelect) {
        submissionCourseSelect.innerHTML = '<option value="">-- 全部课程 --</option>';
        Array.from(courseSet).sort().forEach(course => {
          submissionCourseSelect.innerHTML += `<option value="${escapeHTML(course)}">${escapeHTML(course)}</option>`;
        });
        if (currentSubmissionCourse) submissionCourseSelect.value = currentSubmissionCourse;
      }
    }
    function populateHomeworkAssignmentFilter() {
      const sel = document.getElementById('homeworkAssignmentFilter');
      const course = document.getElementById('homeworkSubmissionCourseSelect').value;
      const previous = sel.value;
      const items = (homeworkAssignmentsCache || []).filter(item => !course || item.course === course);
      sel.innerHTML = '<option value="">-- 全部作业 --</option>';
      for (const item of items) {
        sel.innerHTML += `<option value="${escapeHTML(item.assignment_id)}">${escapeHTML(item.assignment_id)}</option>`;
      }
      if (previous && items.some(item => item.assignment_id === previous)) sel.value = previous;
    }
    function renderHomeworkAssignments() {
      const root = document.getElementById('homeworkAssignmentsList');
      const course = document.getElementById('homeworkCourseSelect').value;
      const items = (homeworkAssignmentsCache || []).filter(item => !course || item.course === course);
      if (!items.length) {
        root.innerHTML = '<p style="font-size:13px;color:var(--text-secondary);margin-top:8px;">当前课程暂无已启用作业</p>';
        return;
      }
      root.innerHTML = items.map(item => `
        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);flex-wrap:wrap;">
          <div>
            <div style="font-size:14px;font-weight:600;">${escapeHTML(item.course)} / ${escapeHTML(item.assignment_id)}</div>
            <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">${item.file_count || 0} 个文件${item.size ? ` · ${formatSize(item.size)}` : ''}</div>
            <div style="margin-top:8px;display:flex;flex-direction:column;gap:6px;">
              ${(item.files || []).map(file => `
                <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;padding:6px 0;">
                  <span style="font-size:12px;color:var(--text-secondary);">${escapeHTML(file.name)}${file.size ? ` · ${formatSize(file.size)}` : ''}</span>
                  <span class="row" style="gap:8px;flex-wrap:wrap;">
                    <a class="small" href="${escapeHTML(file.download_url)}" style="text-decoration:none;display:inline-flex;align-items:center;">下载</a>
                    <button class="small btn-danger" style="margin-top:0;" onclick="deleteHomeworkAssignmentFile(decodeURIComponent('${jsArg(item.course)}'), decodeURIComponent('${jsArg(item.assignment_id)}'), decodeURIComponent('${jsArg(file.name)}'))">删除文件</button>
                  </span>
                </div>
              `).join('')}
            </div>
          </div>
          <div class="row" style="gap:8px;flex-wrap:wrap;">
            <button class="small btn-danger" style="margin-top:0;" onclick="deleteHomeworkAssignment(decodeURIComponent('${jsArg(item.course)}'), decodeURIComponent('${jsArg(item.assignment_id)}'))">删除</button>
          </div>
        </div>
      `).join('');
    }
    function renderHomeworkList() {
      const root = document.getElementById('homeworkList');
      const course = document.getElementById('homeworkSubmissionCourseSelect').value;
      const assignmentID = document.getElementById('homeworkAssignmentFilter').value;
      const items = (homeworkCache || []).filter(item => (!course || item.course === course) && (!assignmentID || item.assignment_id === assignmentID));
      if (!items.length) {
        root.innerHTML = '<p style="font-size:13px;color:var(--text-secondary);margin-top:8px;">暂无匹配的作业提交记录</p>';
        return;
      }
      const rows = items.map(item => {
        const report = item.files && item.files.report;
        const code = item.files && item.files.code;
        const reportText = report && report.uploaded ? `📄 ${escapeHTML(report.original_name)}` : '—';
        const codeText = code && code.uploaded ? `🧩 ${escapeHTML(code.original_name)}` : '—';
        return `
          <tr>
            <td>${escapeHTML(item.course)}</td>
            <td>${escapeHTML(item.assignment_id)}</td>
            <td>${escapeHTML(item.name)}</td>
            <td>${escapeHTML(item.student_no)}</td>
            <td>${escapeHTML(item.class_name)}</td>
            <td>${reportText}</td>
            <td>${codeText}</td>
            <td>${escapeHTML(item.updated_at ? new Date(item.updated_at).toLocaleString('zh-CN', { hour12: false }) : '—')}</td>
            <td><button class="small" onclick="showHomeworkDetail('${escapeHTML(item.id)}')">查看</button></td>
          </tr>
        `;
      }).join('');
      root.innerHTML = `<table><thead><tr><th>课程</th><th>作业</th><th>姓名</th><th>学号</th><th>班级</th><th>PDF</th><th>Notebook</th><th>更新时间</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table>`;
    }
    async function loadHomeworkAssignments() {
      const selectedCourse = document.getElementById('homeworkCourseSelect')?.value || '';
      const url = selectedCourse ? '/api/admin/homework/assignments?course=' + encodeURIComponent(selectedCourse) : '/api/admin/homework/assignments';
      const r = await fetch(url, { credentials:'include' });
      if (!r.ok) return;
      const data = await r.json();
      homeworkAssignmentsCache = data.items || [];
      syncHomeworkCourseOptions(data.courses || []);
      renderHomeworkAssignments();
      populateHomeworkAssignmentFilter();
    }
    async function loadHomeworkSubmissions() {
      const course = document.getElementById('homeworkSubmissionCourseSelect')?.value || '';
      const assignmentID = document.getElementById('homeworkAssignmentFilter')?.value || '';
      const params = new URLSearchParams();
      if (course) params.set('course', course);
      if (assignmentID) params.set('assignment_id', assignmentID);
      const url = params.size ? '/api/admin/homework/submissions?' + params.toString() : '/api/admin/homework/submissions';
      const r = await fetch(url, { credentials:'include' });
      if (!r.ok) return;
      const data = await r.json();
      homeworkCache = data.items || [];
      renderHomeworkList();
    }
    function downloadHomeworkBulkArchive() {
      const course = document.getElementById('homeworkSubmissionCourseSelect')?.value || '';
      const assignmentID = document.getElementById('homeworkAssignmentFilter')?.value || '';
      if (!course || !assignmentID) {
        alert('请先选择课程和作业编号');
        return;
      }
      const params = new URLSearchParams({ course, assignment_id: assignmentID });
      window.open('/api/admin/homework/archive-all?' + params.toString(), '_blank');
    }
    async function uploadHomeworkAssignments() {
      const course = document.getElementById('homeworkCourseSelect').value;
      const assignmentID = (document.getElementById('homeworkAssignmentIdInput').value || '').trim();
      const files = Array.from(document.getElementById('homeworkAssignmentFiles').files || []);
      const resultBox = document.getElementById('homeworkAssignmentResults');
      if (!course) { alert('请先选择课程'); return; }
      if (!assignmentID) { alert('请输入作业编号'); return; }
      if (!files.length) { alert('请选择要上传的作业文件'); return; }
      const fd = new FormData();
      fd.append('course', course);
      fd.append('assignment_id', assignmentID);
      for (const file of files) fd.append('files', file);
      const r = await fetch('/api/admin/homework/assignments/upload', { method:'POST', credentials:'include', body: fd });
      const text = await r.text();
      let data = null;
      try { data = JSON.parse(text); } catch (_) {}
      if (!r.ok && !data) { alert(text); return; }
      if (!data) { alert('上传响应异常'); return; }
      const uploaded = data.uploaded || [];
      const failed = data.failed || [];
      const lines = [];
      if (uploaded.length) lines.push(`成功保存 ${uploaded.length} 个文件到 ${assignmentID}`);
      if (failed.length) lines.push(`失败 ${failed.length} 个：${failed.map(i => `${i.file}（${i.error}）`).join('；')}`);
      resultBox.textContent = lines.join(' | ') || '未返回上传结果';
      document.getElementById('homeworkAssignmentFiles').value = '';
      await loadHomeworkAssignments();
      await loadHomeworkSubmissions();
    }
    async function deleteHomeworkAssignmentFile(course, assignmentID, file) {
      if (!confirm(`确认删除 ${course}/${assignmentID}/${file} 吗？`)) return;
      const r = await fetch('/api/admin/homework/assignments/delete-file', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        credentials:'include',
        body: JSON.stringify({ course, assignment_id: assignmentID, file })
      });
      if (!r.ok) { alert(await r.text()); return; }
      await loadHomeworkAssignments();
      await loadHomeworkSubmissions();
    }
    async function deleteHomeworkAssignment(course, assignmentID) {
      if (!confirm(`确认删除 ${course}/${assignmentID} 的全部作业文件吗？`)) return;
      const r = await fetch('/api/admin/homework/assignments/delete', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        credentials:'include',
        body: JSON.stringify({ course, assignment_id: assignmentID })
      });
      if (!r.ok) { alert(await r.text()); return; }
      await loadHomeworkAssignments();
      await loadHomeworkSubmissions();
    }
    async function showHomeworkDetail(id) {

      document.getElementById('detail').innerHTML = `
        <div class="meta">
          <p><strong>课程：</strong>${escapeHTML(item.course)}</p>
          <p><strong>作业编号：</strong>${escapeHTML(item.assignment_id)}</p>
          <p><strong>姓名：</strong>${escapeHTML(item.name)}</p>
          <p><strong>学号：</strong>${escapeHTML(item.student_no)}</p>
          <p><strong>班级：</strong>${escapeHTML(item.class_name)}</p>
          <p><strong>最后更新：</strong>${escapeHTML(item.updated_at ? new Date(item.updated_at).toLocaleString('zh-CN', { hour12: false }) : '—')}</p>
        </div>
        <div class="qitem">
          <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;">
            <div>
              <strong>📄 报告 PDF</strong>
              <div style="margin-top:6px;color:var(--text-secondary);font-size:13px;">${report && report.uploaded ? escapeHTML(report.original_name) : '未上传'}</div>
            </div>
            <div class="row" style="gap:8px;flex-wrap:wrap;">
              ${report && report.uploaded ? `<a class="small" href="${escapeHTML(item.report_preview_url)}" target="_blank" style="text-decoration:none;display:inline-flex;align-items:center;">预览</a><a class="small" href="${escapeHTML(item.report_download_url)}" style="text-decoration:none;display:inline-flex;align-items:center;">下载 PDF</a>` : '<span style="font-size:12px;color:var(--text-secondary);">暂无 PDF</span>'}
            </div>
          </div>
        </div>
        <div class="qitem">
          <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;">
            <div>
              <strong>🧩 实验 Notebook</strong>
              <div style="margin-top:6px;color:var(--text-secondary);font-size:13px;">${code && code.uploaded ? escapeHTML(code.original_name) : '未上传'}</div>
            </div>
            <div class="row" style="gap:8px;flex-wrap:wrap;">
              ${code && code.uploaded ? `<a class="small" href="${escapeHTML(item.code_download_url)}" style="text-decoration:none;display:inline-flex;align-items:center;">下载 Notebook</a>` : '<span style="font-size:12px;color:var(--text-secondary);">暂无 Notebook</span>'}
            </div>
          </div>
        </div>
        <div class="row" style="margin-top:12px;gap:8px;flex-wrap:wrap;">
          <a class="small" href="${escapeHTML(item.archive_download_url || '#')}" style="text-decoration:none;display:inline-flex;align-items:center;${item.archive_download_url ? '' : 'pointer-events:none;opacity:0.5;'}">下载该同学全部文件</a>
        </div>
      `;
      document.getElementById('detailModal').classList.add('show');
      document.body.style.overflow = 'hidden';
    }
    async function showDetail(id) {
      const r = await fetch('/api/admin/attempt-detail?id=' + encodeURIComponent(id), { credentials:'include' });
      if (!r.ok) {
        alert(await r.text());
        return;
      }
      const data = await r.json();
      const html = data.questions.map((q, i) => {
        const image = q.image ? `<div><img class="qimage" src="/assets/${escapeHTML(q.image)}" /></div>` : '';
        const reference = q.reference ? `<div>参考答案：${escapeHTML(q.reference)}</div>` : '';

    function renderMd(text) {
      if (!text) return '暂无';
      let s = escapeHTML(text);
      s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
      s = s.replace(/`(.+?)`/g, '<code style="background:#f1f5f9;padding:1px 4px;border-radius:4px;font-size:13px;">$1</code>');
      s = s.replace(/^(\d+)\.\s/gm, '<strong>$1.</strong> ');
      s = s.replace(/^[-•]\s/gm, '• ');
      s = s.replace(/\n/g, '<br/>');
      return s;
    }

      });

      if (!data) { alert('上传响应异常'); return; }

      if (uploaded.length) lines.push(`成功 ${uploaded.length} 个：${uploaded.map(i => i.file).join('、')}`);

    function toUint8(dataURL) {
      const b64 = dataURL.split(',')[1];
      const raw = atob(b64);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }
    function buildPDFWithJPEG(jpegBytes, imgW, imgH) {
      const encoder = new TextEncoder();
      const parts = [];
      const offsets = [0];
      let pos = 0;
      const pushText = (s) => { const d = encoder.encode(s); parts.push(d); pos += d.length; };
      const pushBytes = (b) => { parts.push(b); pos += b.length; };
      const pageW = 595.28, pageH = 841.89;
      let drawW = pageW - 40;
      let drawH = drawW * imgH / imgW;
      if (drawH > pageH - 40) { drawH = pageH - 40; drawW = drawH * imgW / imgH; }
      const x = (pageW - drawW) / 2, y = pageH - 20 - drawH;
      const content = `q\n${drawW.toFixed(2)} 0 0 ${drawH.toFixed(2)} ${x.toFixed(2)} ${y.toFixed(2)} cm\n/Im0 Do\nQ\n`;
      pushText('%PDF-1.4\n%\xE2\xE3\xCF\xD3\n');
      offsets.push(pos); pushText('1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n');
      offsets.push(pos); pushText('2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n');
      offsets.push(pos); pushText(`3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageW.toFixed(2)} ${pageH.toFixed(2)}] /Resources 6 0 R /Contents 5 0 R >>\nendobj\n`);
      offsets.push(pos); pushText(`4 0 obj\n<< /Type /XObject /Subtype /Image /Width ${imgW} /Height ${imgH} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpegBytes.length} >>\nstream\n`); pushBytes(jpegBytes); pushText('\nendstream\nendobj\n');
      const contentBytes = encoder.encode(content);
      offsets.push(pos); pushText(`5 0 obj\n<< /Length ${contentBytes.length} >>\nstream\n${content}endstream\nendobj\n`);
      offsets.push(pos); pushText('6 0 obj\n<< /XObject << /Im0 4 0 R >> >>\nendobj\n');
      const xrefPos = pos;
      pushText('xref\n0 7\n');
      pushText('0000000000 65535 f \n');
      for (let i = 1; i <= 6; i++) pushText(String(offsets[i]).padStart(10, '0') + ' 00000 n \n');
      pushText(`trailer\n<< /Size 7 /Root 1 0 R >>\nstartxref\n${xrefPos}\n%%EOF`);
      return new Blob(parts, { type: 'application/pdf' });
    }

    document.getElementById('detailModal').onclick = (evt) => {
      if (evt.target.id === 'detailModal') closeDetail();
    };
    document.getElementById('quizFile').onchange = async (evt) => {
      const file = evt.target.files && evt.target.files[0];
      if (!file) return;
      pickedYAML = await file.text();
      document.getElementById('yaml').value = pickedYAML;
    };
  </script>
</body>
</html>
