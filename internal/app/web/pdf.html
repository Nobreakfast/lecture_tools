<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>课程材料</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card-bg: rgba(255, 255, 255, 0.7);
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --text: #0f172a;
      --text-secondary: #475569;
      --border: rgba(226, 232, 240, 0.8);
      --radius: 16px;
      --shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05), 0 0 3px rgba(0, 0, 0, 0.02);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      max-width: 760px;
      margin: 24px auto;
      padding: 0 12px;
      background: linear-gradient(135deg, #f6f8fd 0%, #f1f5f9 100%);
      min-height: 100vh;
      color: var(--text);
      line-height: 1.6;
    }
    h2 { font-size: 20px; margin-bottom: 16px; }
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px -4px rgba(0, 0, 0, 0.08), 0 4px 10px -2px rgba(0, 0, 0, 0.04);
    }
    .folder-title {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 8px;
      color: var(--text-secondary);
    }
    .pdf-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .pdf-item:last-child { border-bottom: none; }
    .pdf-name {
      font-size: 14px;
      font-weight: 500;
    }
    .pdf-size {
      font-size: 12px;
      color: var(--text-secondary);
      margin-left: 8px;
    }
    .pdf-actions {
      display: flex;
      gap: 8px;
    }
    .pdf-actions a {
      display: inline-block;
      padding: 5px 12px;
      font-size: 13px;
      border-radius: 8px;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, var(--primary) 0%, #6366f1 100%);
      box-shadow: 0 2px 8px rgba(79, 70, 229, 0.2);
      transition: all 0.2s ease;
    }
    .pdf-actions a:hover { 
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    }
    .empty { color: var(--text-secondary); font-size: 14px; padding: 20px 0; text-align: center; }
  </style>
</head>
<body>
  <h2>📚 课程材料</h2>
  <div id="content"><div class="empty">加载中...</div></div>
  <script>
    function escapeHTML(s) {
      return String(s || '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');
    }
    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
      return (bytes/(1024*1024)).toFixed(1) + ' MB';
    }
    async function load() {
      const r = await fetch('/api/materials');
      if (!r.ok) {
        document.getElementById('content').innerHTML = '<div class="empty">加载失败</div>';
        return;
      }
      const data = await r.json();
      const items = data.items || [];
      if (items.length === 0) {
        document.getElementById('content').innerHTML = '<div class="empty">暂无课程材料</div>';
        return;
      }
      const grouped = {};
      for (const group of items) {
        if (!grouped[group.folder]) grouped[group.folder] = [];
        grouped[group.folder].push(group);
      }
      let html = '';
      for (const [folder, groups] of Object.entries(grouped)) {
        html += `<div class="card"><div class="folder-title">📂 ${escapeHTML(folder)}</div>`;
        for (const group of groups) {
          html += `<div class="pdf-item" style="display:block;">
            <div style="margin-bottom:8px;">
              <span class="pdf-name">${escapeHTML(group.stem || '未命名材料')}</span>
            </div>`;
          if (group.pdf) {
            html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0 8px;">
              <div>
                <span class="pdf-name">📄 ${escapeHTML(group.pdf.file)}</span>
                <span class="pdf-size">${formatSize(group.pdf.size)}</span>
              </div>
              <div class="pdf-actions">
                <a href="${escapeHTML(group.pdf.preview_url)}" target="_blank">预览</a>
                <a href="${escapeHTML(group.pdf.download_url)}">下载</a>
              </div>
            </div>`;
          }
          for (const f of (group.downloads || [])) {
            if (group.pdf && f.file === group.pdf.file) continue;
            html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0 0 12px;">
              <div>
                <span class="pdf-name">📎 ${escapeHTML(f.file)}</span>
                <span class="pdf-size">${formatSize(f.size)}</span>
              </div>
              <div class="pdf-actions">
                <a href="${escapeHTML(f.url)}">下载</a>
              </div>
            </div>`;
          }
          html += `</div>`;
        }
        html += '</div>';
      }
      document.getElementById('content').innerHTML = html;
    }
    load();
  </script>
</body>
</html>
