<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>课堂答题</title>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)'], ['$', '$']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --success: #059669;
      --danger: #dc2626;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 16px 100px;
      line-height: 1.6;
    }
    #title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 14px;
    }
    .card strong {
      display: inline;
      font-size: 15px;
      line-height: 1.5;
    }
    .qimage {
      width: min(100%, 340px);
      border-radius: 8px;
      margin-top: 10px;
      border: 1px solid var(--border);
    }
    .opt-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .opt {
      display: block;
      width: 100%;
      text-align: left;
      padding: 11px 14px;
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card-bg);
      font-size: 14px;
      color: var(--text);
      cursor: pointer;
      transition: border-color .2s, background .2s, transform .1s;
    }
    .opt:hover {
      border-color: var(--primary);
      background: #eff6ff;
    }
    .opt:active {
      transform: scale(.98);
    }
    .opt.active {
      border-color: var(--primary);
      background: #eff6ff;
      box-shadow: 0 0 0 2px rgba(37,99,235,.15);
    }
    .opt strong {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      width: 22px;
      height: 22px;
      line-height: 22px;
      text-align: center;
      border-radius: 50%;
      font-size: 12px;
      margin-right: 6px;
      vertical-align: middle;
    }
    .opt-image {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: contain;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      margin-top: 8px;
    }
    .hint {
      color: var(--text-secondary);
      font-size: 13px;
      margin-top: 10px;
    }
    .text-answer {
      width: 100%;
      margin-top: 10px;
      min-height: 90px;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      color: var(--text);
      background: var(--bg);
      resize: vertical;
      transition: border-color .2s, outline .2s;
    }
    .text-answer:focus {
      border-color: var(--primary);
      outline: 2px solid var(--primary);
      outline-offset: -1px;
    }
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--card-bg);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      z-index: 100;
    }
    .bottom-bar-inner {
      max-width: 760px;
      margin: 0 auto;
    }
    #submit {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }
    #submit:hover { background: var(--primary-hover); }
    #submit:active { transform: scale(.98); }
  </style>
</head>
<body>
  <h2 id="title">加载中...</h2>
  <div id="questions"></div>
  <div class="bottom-bar"><div class="bottom-bar-inner"><button id="submit">提交并查看结果</button></div></div>
  <script>
    let state = null;
    function orderLabel(index) {
      const labels = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩'];
      return labels[index] || String(index + 1);
    }
    function escapeHTML(s) {
      return String(s || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }
    async function load() {
      const r = await fetch('/api/me', { credentials: 'include' });
      if (!r.ok) {
        alert('请先从入口进入');
        location.href = '/join';
        return;
      }
      state = await r.json();
      document.getElementById('title').textContent = state.quiz.title;
      render();
      if (state.attempt.status === 'submitted') location.href = '/result';
    }
    function render() {
      const root = document.getElementById('questions');
      root.innerHTML = '';
      state.quiz.questions.forEach((q, idx) => {
        const card = document.createElement('div');
        card.className = 'card';
        const image = q.image ? `<img class="qimage" src="/assets/${q.image}" />` : '';
        card.innerHTML = `<strong>${idx + 1}. ${escapeHTML(q.stem)}</strong>${image}`;
        if (q.type === 'short_answer') {
          const area = document.createElement('textarea');
          area.className = 'text-answer';
          area.dataset.qid = q.id;
          area.placeholder = '请输入你的回答...';
          area.value = state.answers[q.id] || '';
          card.appendChild(area);
        } else if (q.type === 'multi_choice') {
          const selected = new Set(String(state.answers[q.id] || '').split(',').map(s => s.trim()).filter(Boolean));
          const box = document.createElement('div');
          const hasImageOption = (q.options || []).some(op => !!op.image);
          box.className = hasImageOption ? 'opt-grid' : '';
          q.options.forEach((op, opIndex) => {
            const b = document.createElement('button');
            b.className = 'opt' + (selected.has(op.key) ? ' active' : '');
            const text = op.image ? '' : (op.text ? escapeHTML(op.text) : `选项 ${escapeHTML(op.key)}`);
            const opImage = op.image ? `<img class="opt-image" src="/assets/${escapeHTML(op.image)}" />` : '';
            b.innerHTML = `<strong>${orderLabel(opIndex)}</strong> ${text}${opImage}`;
            b.onclick = () => {
              if (selected.has(op.key)) {
                selected.delete(op.key);
              } else {
                selected.add(op.key);
              }
              const answer = Array.from(selected).sort().join(',');
              save(q.id, answer);
            };
            box.appendChild(b);
          });
          card.appendChild(box);
          const hint = document.createElement('div');
          hint.className = 'hint';
          hint.textContent = '本题可多选，再次点击可取消。';
          card.appendChild(hint);
        } else {
          q.options.forEach((op, opIndex) => {
            const b = document.createElement('button');
            b.className = 'opt' + ((state.answers[q.id] === op.key) ? ' active' : '');
            const text = op.image ? '' : (op.text ? escapeHTML(op.text) : `选项 ${escapeHTML(op.key)}`);
            const opImage = op.image ? `<img class="opt-image" src="/assets/${escapeHTML(op.image)}" />` : '';
            b.innerHTML = `<strong>${orderLabel(opIndex)}</strong> ${text}${opImage}`;
            b.onclick = () => save(q.id, op.key);
            card.appendChild(b);
          });
        }
        root.appendChild(card);
      });
      if (window.MathJax && window.MathJax.typesetPromise) {
        window.MathJax.typesetPromise([root]);
      }
    }
    async function save(qid, ans) {
      const r = await fetch('/api/answer', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        credentials: 'include',
        body: JSON.stringify({ question_id: qid, answer: ans })
      });
      if (!r.ok) {
        alert(await r.text());
        return;
      }
      state.answers[qid] = ans;
      render();
    }
    document.getElementById('submit').onclick = async () => {
      const areas = document.querySelectorAll('textarea.text-answer[data-qid]');
      for (const area of areas) {
        const qid = area.dataset.qid;
        const val = area.value.trim();
        if (val && val !== (state.answers[qid] || '')) {
          const sr = await fetch('/api/answer', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            credentials: 'include',
            body: JSON.stringify({ question_id: qid, answer: val })
          });
          if (!sr.ok) {
            alert('保存简答失败：' + await sr.text());
            return;
          }
          state.answers[qid] = val;
        }
      }
      const r = await fetch('/api/submit', { method:'POST', credentials:'include' });
      if (!r.ok) {
        alert(await r.text());
        return;
      }
      location.href = '/result';
    };
    load();
  </script>
</body>
</html>
