quiz_id: "week_01"
title: "第一周课堂反馈"
questions:
  - id: "q1"
    type: "single_choice"
    stem: "Go 中用于定义结构体的关键字是？"
    options:
      - key: "A"
        text: "class"
      - key: "B"
        text: "struct"
      - key: "C"
        text: "object"
    correct_answer: "B"
    explanation: "struct 用于声明结构体类型。"
    knowledge_tag: "Go语法"
  - id: "q2"
    type: "yes_no"
    stem: "你是否理解了今天的示例代码？"
    options:
      - key: "Y"
        text: "是"
      - key: "N"
        text: "否"
    correct_answer: "Y"
    knowledge_tag: "课堂理解"
  - id: "q3"
    type: "multi_choice"
    stem: "下列哪些属于常见的凸函数判定方法？"
    options:
      - key: "A"
        text: "定义不等式法"
      - key: "B"
        text: "一阶条件"
      - key: "C"
        text: "二阶条件/Hessian 半正定"
      - key: "D"
        text: "只看函数值是否恒正"
    correct_answer: "A,B,C"
    explanation: "定义法、一阶条件、二阶条件都可用于验证凸性。"
    knowledge_tag: "凸函数"
  - id: "q4"
    type: "survey"
    stem: "你希望下节课增加什么内容？"
    options:
      - key: "A"
        text: "更多案例"
      - key: "B"
        text: "更多练习"
      - key: "C"
        text: "更多讲解"
  - id: "q5"
    type: "short_answer"
    stem: "请描述你目前最困惑的知识点。"
    reference_answer: "可从定义、几何意义、判定方法三方面回顾。"
