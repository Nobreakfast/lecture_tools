questions:
  - id: 'w2l2_01'
    type: 'single_choice'
    stem: '关于广义实值函数 \(f:\mathbb{R}^n\to\mathbb{R}\cup\{+\infty\}\)，下列哪项最准确？'
    correct_answer: 'B'
    explanation: '广义实值函数允许在不可行点取 \(+\infty\) 以编码约束；有效定义域是取有限值的点集，不要求等于整个 \(\mathbb{R}^n\)。'
    knowledge_tag: '广义实值函数'
    pool_tag: '广义实值函数'
    options:
      - key: 'A'
        text: '广义实值函数要求每个点都取有限实数，只是记号写成了 \(\mathbb{R}\cup\{+\infty\}\)'
      - key: 'B'
        text: '它允许在部分点取 \(\pm\infty\)，并可用来把约束并入目标函数'
      - key: 'C'
        text: '它与普通实值函数完全等价，不改变优化问题可行域表达'
      - key: 'D'
        text: '其有效定义域必须是仿射集，否则函数不合法'
  - id: 'w2l2_02'
    type: 'single_choice'
    stem: '下列哪一个函数是“适当函数（proper）”？'
    correct_answer: 'D'
    explanation: 'proper 的标准是：不在任何点取 \(-\infty\)，且至少在一个点上取有限值；不能处处 \(+\infty\)。'
    knowledge_tag: '适当函数'
    pool_tag: '适当函数'
    options:
      - key: 'A'
        text: '对所有 \(x\)，\(f(x)=+\infty\)'
      - key: 'B'
        text: '存在某点 \(x_0\) 使 \(f(x_0)=-\infty\)，其余点有限'
      - key: 'C'
        text: '所有点都有限且可导，才算 proper'
      - key: 'D'
        text: '不取 \(-\infty\)，且至少有一个点取有限实数'
  - id: 'w2l2_03'
    type: 'multi_choice'
    stem: '下列候选图中，哪些是某个函数的上方图（epigraph）？（可多选）'
    correct_answer: 'A,C'
    explanation: '上方图满足“对每个 \(x\)，在某个阈值之上的 \(t\) 全部属于集合”。图 A 与图 C 都体现了“向上封闭”结构。'
    knowledge_tag: '上方图'
    pool_tag: '上方图判定'
    options:
      - key: 'A'
        image: 'w2l2_epi_A.svg'
      - key: 'B'
        image: 'w2l2_epi_B.svg'
      - key: 'C'
        image: 'w2l2_epi_C.svg'
      - key: 'D'
        image: 'w2l2_epi_D.svg'
  - id: 'w2l2_04'
    type: 'multi_choice'
    stem: '下列候选图中，哪些可以作为某个凸函数的下水平集 \(C_\alpha=\{x\mid f(x)\le\alpha\}\)？（可多选）'
    correct_answer: 'B,D'
    explanation: '凸函数的下水平集一定是凸集。图 B（圆盘）与图 D（矩形）是凸集，A 与 C 为非凸。'
    knowledge_tag: '下水平集'
    pool_tag: '下水平集判定'
    options:
      - key: 'A'
        image: 'w2l2_sub_A.svg'
      - key: 'B'
        image: 'w2l2_sub_B.svg'
      - key: 'C'
        image: 'w2l2_sub_C.svg'
      - key: 'D'
        image: 'w2l2_sub_D.svg'
  - id: 'w2l2_05'
    type: 'single_choice'
    stem: '关于凸函数定义，下列哪项最严谨？'
    correct_answer: 'C'
    explanation: '不仅要满足 Jensen 型不等式，还要求定义域本身是凸集；缺少“凸域”条件定义不完整。'
    knowledge_tag: '凸函数定义'
    pool_tag: '凸函数定义'
    options:
      - key: 'A'
        text: '只要在某一个固定 \(\theta=\frac12\) 时不等式成立，就可称为凸函数'
      - key: 'B'
        text: '对任意 \(x,y\in\mathrm{dom} f\) 与 \(\theta\in(0,1)\) 成立严格不等式，才算凸函数'
      - key: 'C'
        text: '定义域为凸集，且任意 \(x,y\in\mathrm{dom} f,\theta\in[0,1]\) 满足 \(f(\theta x+(1-\theta)y)\le \theta f(x)+(1-\theta)f(y)\)'
      - key: 'D'
        text: '只要函数连续且有唯一极小值，就是凸函数'
  - id: 'w2l2_06'
    type: 'single_choice'
    stem: '下列关于“严格凸”与“强凸”的区别，哪项正确？'
    correct_answer: 'B'
    explanation: '强凸比严格凸更强：存在统一的二次下界参数 \(\mu>0\)；严格凸不必给出这种全局曲率下界。'
    knowledge_tag: '强凸函数'
    pool_tag: '强凸函数定义'
    options:
      - key: 'A'
        text: '严格凸与强凸等价，只是写法不同'
      - key: 'B'
        text: '强凸要求存在 \(\mu>0\) 的统一二次项下界；严格凸不一定有该参数'
      - key: 'C'
        text: '严格凸一定可导，强凸不一定可导'
      - key: 'D'
        text: '强凸函数的 Hessian 必须在所有点恒等于 \(\mu I\)'
  - id: 'w2l2_08'
    type: 'multi_choice'
    stem: '验证“某函数是凸函数”的方法有哪些？（多选）'
    correct_answer: 'A,B,C,D,E'
    explanation: '常见方法包括定义法、一阶条件、二阶条件、上方图、保凸运算。Jensen 在本次课程未讲，不作为本题方法。'
    knowledge_tag: '凸函数验证'
    pool_tag: '凸函数验证方法'
    options:
      - key: 'A'
        text: '定义不等式法：直接验证 \(f(\theta x+(1-\theta)y)\le \theta f(x)+(1-\theta)f(y)\)'
      - key: 'B'
        text: '一阶条件（可导时）：\(f(y)\ge f(x)+\nabla f(x)^\top(y-x)\)'
      - key: 'C'
        text: '二阶条件（可二阶时）：Hessian 在定义域内处处半正定'
      - key: 'D'
        text: '上方图（epigraph）是凸集'
      - key: 'E'
        text: '由已知凸函数通过非负加权和、仿射复合、取上确界等保凸运算构造'
      - key: 'F'
        text: '只要函数处处可导，就一定是凸函数'
      - key: 'G'
        text: '只看图像“肉眼像碗”即可判定'
  - id: 'w2l2_07'
    type: 'short_answer'
    stem: '描述凸函数、严格凸函数、强凸函数在“图像形状”上的主要差别。'
    reference_answer: '凸函数：连线在图像上方（可出现线性平段）；严格凸：除端点外连线严格在图像上方，通常更“弯”；强凸：在严格凸基础上还有统一曲率下界，看起来至少有固定“碗形厚度”。'
    explanation: '可从“是否允许平段”和“是否有统一曲率下界”来区分三者。'
