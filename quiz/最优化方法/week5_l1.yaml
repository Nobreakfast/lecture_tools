quiz_id: 'w5_l1'
title: 'Week5-L1 课堂小测（线搜索、梯度下降、牛顿法与拟牛顿）'
questions:
  - id: 'w5l1_q1'
    type: 'multi_choice'
    stem: '以下函数在 \(\mathbb{R}\) 上存在极小值点的是哪些？（多选）'
    correct_answer: 'A,C,D,F'
    explanation: '\(x^2\)、\(\sin x\)、\(|x|\)、\((x-1)^2+2\) 都有极小值点；\(e^x\) 在 \(\mathbb{R}\) 上下确界为 0 但取不到；\(-x^2\) 无最小值。'
    knowledge_tag: '极小值存在性'
    options:
      - key: 'A'
        text: '\(f(x)=x^2\)'
      - key: 'B'
        text: '\(f(x)=e^x\)'
      - key: 'C'
        text: '\(f(x)=\sin x\)'
      - key: 'D'
        text: '\(f(x)=|x|\)'
      - key: 'E'
        text: '\(f(x)=-x^2\)'
      - key: 'F'
        text: '\(f(x)=(x-1)^2+2\)'

  - id: 'w5l1_q2'
    type: 'single_choice'
    stem: '以下对无约束最优化中“最优条件”的说法，正确的是：'
    correct_answer: 'B'
    explanation: '对可微函数，局部极小点满足一阶必要条件 \(\nabla f(x^*)=0\)，但该条件不是充分条件。'
    knowledge_tag: '最优性条件'
    options:
      - key: 'A'
        text: '只要 \(\nabla f(x)=0\)，该点一定是局部极小点'
      - key: 'B'
        text: '若 \(x^*\) 是可微函数的局部极小点，则必有 \(\nabla f(x^*)=0\)'
      - key: 'C'
        text: '二阶导数大于 0 是所有最优点都必须满足的必要条件'
      - key: 'D'
        text: '最优条件与函数是否可微无关'

  - id: 'w5l1_q3'
    type: 'single_choice'
    stem: '在线搜索方法中，公式 \(\cos\theta_k = \frac{-\nabla f(x^k)^\top d^k}{\|\nabla f(x^k)\| \|d^k\|}\) 描述的是哪两个向量的夹角？'
    correct_answer: 'C'
    explanation: '该式是 \(-\nabla f(x^k)\) 与搜索方向 \(d^k\) 的夹角余弦，用来衡量方向是否具有下降性。'
    knowledge_tag: '线搜索与下降方向'
    options:
      - key: 'A'
        text: '\(\nabla f(x^k)\) 与 \(d^k\)'
      - key: 'B'
        text: '\(x^k\) 与 \(x^{k+1}\)'
      - key: 'C'
        text: '\(-\nabla f(x^k)\) 与 \(d^k\)'
      - key: 'D'
        text: '\(\nabla f(x^{k+1})\) 与 \(\nabla f(x^k)\)'

  - id: 'w5l1_q4'
    type: 'multi_choice'
    stem: '以下对梯度下降法和牛顿法的描述，正确的是哪些？（多选）'
    correct_answer: 'A,B,C,D'
    explanation: '梯度下降主要利用一阶信息、单步计算便宜；牛顿法利用二阶信息，局部收敛速度通常更快，但计算代价更高。'
    knowledge_tag: '梯度下降与牛顿法对比'
    options:
      - key: 'A'
        text: '梯度下降法主要使用一阶导数信息'
      - key: 'B'
        text: '牛顿法需要用到 Hessian（或其相关线性方程）'
      - key: 'C'
        text: '在合适条件下，牛顿法在最优点附近通常收敛更快'
      - key: 'D'
        text: '梯度下降法单步计算通常更简单，更适合大规模问题'
      - key: 'E'
        text: '牛顿法每一步都不需要任何步长策略'
      - key: 'F'
        text: '梯度下降法对任意步长都一定收敛'

  - id: 'w5l1_q5'
    type: 'multi_choice'
    stem: '以下对牛顿类算法缺点的描述，正确的是哪些？（多选）'
    correct_answer: 'A,B,C,D'
    explanation: '牛顿类方法常见问题包括二阶信息开销高、矩阵可能不正定、对初值敏感以及高维存储与计算压力大。'
    knowledge_tag: '牛顿类算法缺点'
    options:
      - key: 'A'
        text: '需要计算或近似二阶信息并解线性方程组，计算量可能较大'
      - key: 'B'
        text: 'Hessian 可能非正定，方向不一定是下降方向'
      - key: 'C'
        text: '对初始点可能较敏感，远离最优点时全局收敛性可能不理想'
      - key: 'D'
        text: '在高维问题中，矩阵存储和运算开销较大'
      - key: 'E'
        text: '一旦迭代一步就一定到达全局最优解'

  - id: 'w5l1_q6'
    type: 'multi_choice'
    stem: '哪些方法常用于缓解或改进牛顿类方法在实际中的问题？（多选）'
    correct_answer: 'A,B,C'
    explanation: '在线搜索可改善步长选择与全局性；梯度下降避免昂贵二阶信息；拟牛顿通过近似二阶信息降低成本。'
    knowledge_tag: '牛顿法改进思路'
    options:
      - key: 'A'
        text: '线搜索策略'
      - key: 'B'
        text: '梯度下降法'
      - key: 'C'
        text: '拟牛顿法'
      - key: 'D'
        text: '原始牛顿法本身'

  - id: 'w5l1_q7'
    type: 'multi_choice'
    stem: '以下对割线方程与拟牛顿算法框架的描述，正确的是哪些？（多选）'
    correct_answer: 'A,B,C,D'
    explanation: '拟牛顿法通过满足割线方程更新矩阵近似，并结合搜索方向与步长策略实现迭代。'
    knowledge_tag: '割线方程与拟牛顿'
    options:
      - key: 'A'
        text: '拟牛顿法通常维护 Hessian 或其逆的近似矩阵'
      - key: 'B'
        text: '常见更新满足割线方程：\(B_{k+1}s_k=y_k\) 或 \(H_{k+1}y_k=s_k\)'
      - key: 'C'
        text: '\(s_k=x^{k+1}-x^k,\; y_k=\nabla f(x^{k+1})-\nabla f(x^k)\)'
      - key: 'D'
        text: '常用方向形式为 \(d^k=-H_k\nabla f(x^k)\)，并可配合线搜索'
      - key: 'E'
        text: '割线方程要求每一步都必须精确计算真实 Hessian'
      - key: 'F'
        text: '拟牛顿法与梯度下降完全相同，不需要矩阵更新'

  - id: 'w5l1_q8'
    type: 'short_answer'
    stem: '这堂课理论内容比较多，有哪些不太理解、希望老师重点再讲的？还有哪些问题？对课程有哪些期待？'
    reference_answer: '开放题，无标准答案。可从以下角度回答：哪些概念或推导不清楚（如最优条件、下降方向、割线方程）、希望增加的例题类型、希望课堂节奏如何调整、对后续课程的期待与建议。'
