quiz_id: 'week4_l1'
title: 'Week4-L1 课堂小测（梯度法与Lipschitz连续）'
questions:
  - id: 'w4l1_q1'
    type: 'single_choice'
    stem: '人工智能（AI）、机器学习（ML）、深度学习（DL）三者关系，正确的是：'
    correct_answer: 'B'
    explanation: '通常认为深度学习是机器学习的一个子领域，而机器学习又是人工智能的一个子领域，因此关系为 DL ⊂ ML ⊂ AI。'
    knowledge_tag: 'AI/ML/DL关系'
    options:
      - key: 'A'
        text: 'AI ⊂ ML ⊂ DL'
      - key: 'B'
        text: 'DL ⊂ ML ⊂ AI'
      - key: 'C'
        text: 'ML ⊂ DL ⊂ AI'
      - key: 'D'
        text: '三者互不包含'

  - id: 'w4l1_q2'
    type: 'single_choice'
    stem: '在参数更新公式 \(\theta_{\text{new}} = \theta - \alpha \frac{dL}{d\theta}\) 中，“线搜索（line search）”主要是在讨论哪个变量？'
    correct_answer: 'C'
    explanation: '线搜索本质是在给定下降方向后，选择合适步长，核心是确定 \(\alpha\) 的取值。'
    knowledge_tag: '线搜索'
    options:
      - key: 'A'
        text: '损失函数 \(L\)'
      - key: 'B'
        text: '参数 \(\theta\) 的维度'
      - key: 'C'
        text: '步长（学习率）\(\alpha\)'
      - key: 'D'
        text: '梯度 \(\frac{dL}{d\theta}\) 的符号'

  - id: 'w4l1_q3'
    type: 'single_choice'
    stem: '在参数更新公式 \(\theta_{\text{new}} = \theta - \alpha \frac{dL}{d\theta}\) 中，“梯度下降（gradient descent）”主要是在讨论哪个变量的更新方式？'
    correct_answer: 'A'
    explanation: '梯度下降的核心是参数 \(\theta\) 按负梯度方向更新；\(\alpha\) 的选择属于步长策略（如线搜索）问题。'
    knowledge_tag: '梯度下降'
    options:
      - key: 'A'
        text: '参数 \(\theta\)'
      - key: 'B'
        text: '学习率 \(\alpha\)'
      - key: 'C'
        text: '样本数 \(n\)'
      - key: 'D'
        text: '正则化系数 \(\lambda\)'

  - id: 'w4l1_q4'
    type: 'single_choice'
    stem: '设 \(f_1(x)=x\), \(f_2(x)=-x\)，定义 \(f(x)=\max\{f_1(x),f_2(x)\}=|x|\)。在 \(x=0\) 处，以下哪个数一定属于 \(f\) 的次梯度？'
    correct_answer: 'C'
    explanation: '\(|x|\) 在 \(x=0\) 处的次梯度集合是 \([-1,1]\)。因此 0.5 属于该集合；2、-1.5、3 都不属于。'
    knowledge_tag: '次梯度'
    options:
      - key: 'A'
        text: '2'
      - key: 'B'
        text: '-1.5'
      - key: 'C'
        text: '0.5'
      - key: 'D'
        text: '3'

  - id: 'w4l1_q5'
    type: 'multi_choice'
    stem: '若函数 \(f\) 的梯度是 \(L\)-Lipschitz 连续（即 \(\|\nabla f(x)-\nabla f(y)\|\le L\|x-y\|\)），则下列说法正确的是：（多选）'
    correct_answer: 'A,B,D'
    explanation: '梯度 L-Lipschitz 连续表示梯度变化速度有统一上界，即函数是 L-smooth。若二阶可导，可理解为 Hessian 的算子范数不超过 L。该条件本身不保证凸性。'
    knowledge_tag: 'L-smooth'
    options:
      - key: 'A'
        text: '函数是光滑的（L-smooth）'
      - key: 'B'
        text: '若 \(f\) 二阶可导，则 \(\|\nabla^2 f(x)\|\le L\)'
      - key: 'C'
        text: '函数一定是凸函数'
      - key: 'D'
        text: 'L 越小，梯度随位置变化通常越平缓'

  - id: 'w4l1_q6'
    type: 'multi_choice'
    stem: '若函数 \(f\) 是 \(G\)-Lipschitz 连续（即 \(|f(x)-f(y)|\le G\|x-y\|\)），则下列说法正确的是：（多选）'
    correct_answer: 'A,C,D'
    explanation: '函数值变化率被 G 控制，故函数连续；该条件允许不可导点（如 \(|x|\)）；函数增长至多线性。G-Lipschitz 不推出梯度 L-Lipschitz 光滑性。'
    knowledge_tag: '函数Lipschitz连续'
    options:
      - key: 'A'
        text: '函数一定连续'
      - key: 'B'
        text: '函数一定处处可导'
      - key: 'C'
        text: '函数可以是非光滑的（例如 \(|x|\)）'
      - key: 'D'
        text: '函数值相对自变量变化的速度有全局上界'

  - id: 'w4l1_q7'
    type: 'short_answer'
    stem: '这节课你还有哪些地方没听懂？对课上提到的哪些课外知识更感兴趣？还有没有其他想跟老师说的话？'
    reference_answer: '开放题，无标准答案。可从以下角度回答：没听懂的知识点、希望复习的证明或例题、感兴趣的课外方向（如机器学习优化、深度学习训练技巧、工程实现细节等）、对课堂节奏与互动方式的建议、其他想反馈给老师的内容。'
