quiz_id: 'week3_l2'
title: 'Week3-L2 课堂小测（保凸运算与共轭函数）'
questions:
  - id: 'w3l2_q1'
    type: 'multi_choice'
    stem: '下列运算中，哪些是保凸运算？（多选）'
    correct_answer: 'A,B,C,E,G'
    explanation: '保凸运算包括：非负加权和、仿射映射、取最大值、逐点上确界、复合函数（外层凸且非递减）等。非乘积运算、倒数运算（当函数非负时凸性不保持）、取下确界、取负指数等不是保凸运算。'
    knowledge_tag: '保凸运算'
    options:
      - key: 'A'
        text: '非负加权和：若 \(f_1,\dots,f_m\) 为凸，则 \(w_1f_1+\dots+w_mf_m\)（\(w_i\ge0\)）为凸'
      - key: 'B'
        text: '仿射映射：若 \(f\) 为凸，则 \(g(x)=f(Ax+b)\) 为凸'
      - key: 'C'
        text: '取最大值：若 \(f_1,\dots,f_m\) 为凸，则 \(\max\{f_1,\dots,f_m\}\) 为凸'
      - key: 'D'
        text: '乘积运算：若 \(f,g\) 为凸，则 \(f\cdot g\) 为凸'
      - key: 'E'
        text: '逐点上确界：\(g(x)=\sup_{y\in\mathcal{C}} f(x,y)\)（每个 \(f(\cdot,y)\) 为凸）'
      - key: 'F'
        text: '取倒数：若 \(f\) 为凸且 \(f>0\)，则 \(1/f\) 为凸'
      - key: 'G'
        text: '复合函数：若 \(f\) 为凸且非递减，则 \(g(x)=h(f(x))\) 为凸'
      - key: 'H'
        text: '取下确界：\(\inf_{y} f(x,y)\) 必为凸'
  - id: 'w3l2_q2'
    type: 'multi_choice'
    stem: '下列函数中，哪些是凸函数？（多选）'
    correct_answer: 'B,D'
    explanation: '指数函数 \(e^{ax}\) 是凸的（其二次导数 \(a^2e^{ax}>0\)）。负对数 \(-\log x\) 是凸的（其在定义域上二阶导数 \(1/x^2>0\)）。而 \(-x^2\) 是凹函数，\(\sin x\) 在整体上非凸非凹。'
    knowledge_tag: '凸函数判定'
    options:
      - key: 'A'
        text: '\(f(x) = -x^2\)（定义域 \(\mathbb{R}\)）'
      - key: 'B'
        text: '\(f(x) = e^{ax}\)（\(a\neq0\)，定义域 \(\mathbb{R}\)）'
      - key: 'C'
        text: '\(f(x) = \sin x\)（定义域 \(\mathbb{R}\)）'
      - key: 'D'
        text: '\(f(x) = -\log x\)（定义域 \(x>0\)）'
  - id: 'w3l2_q3'
    type: 'single_choice'
    stem: '小贩每天进货成本固定为 3 元/天，出售一种早点。若定价为 \(p\) 元/个，需求量等于 \(10-p\) 个/天（若 \(p>10\) 则需求为 0）。则小贩的利润函数为 \(f(p) = p\cdot\max(10-p,0) - 3\)。该函数的共轭函数 \(f^*(y) = \sup_{p\in\mathbb{R}}\{yp - f(p)\}\) 的值是多少？'
    correct_answer: 'D'
    explanation: '把利润函数写成 \(f(p)=10p-p^2-3\)。按定义 \(f^*(y)=\sup_p\{yp-f(p)\}=\sup_p\{p^2+(y-10)p+3\}\)。配方后可得最优点 \(p^*=(10-y)/2\)，代回得到 \(f^*(y)=-y^2/4+5y-22\)。'
    knowledge_tag: '共轭函数'
    options:
      - key: 'A'
        text: '\(f^*(y) = y^2/4 + 5y - 22\)'
      - key: 'B'
        text: '\(f^*(y) = y^2/4 - 22\)'
      - key: 'C'
        text: '\(f^*(y) = -y^2/4 - 5y - 22\)'
      - key: 'D'
        text: '\(f^*(y) = -y^2/4 + 5y - 22\)'
  - id: 'w3l2_q4'
    type: 'single_choice'
    stem: '接上题，小贩利润函数的二次共轭函数 \(f^{**}(x) = \sup_{y\in\mathbb{R}}\{yx - f^*(y)\}\) 的值是多少？'
    correct_answer: 'C'
    explanation: '由共轭函数的性质，对凸函数（且适当）有 \(f^{**} = f\)。由于利润函数 \(f(p) = p(10-p) - 3\) 是凹函数（开口向下的二次函数），而非凸函数，所以 \(f^{**} \neq f\)。实际上，\(f\) 的凸包（凸闭包）等于将原函数在 \(p>10\) 区域（下凹部分）用仿射函数包络起来，得到分段函数：\(f^{**}(p) = 0\)（当 \(p<0\) 时，取需求为 0 时的利润 \(-3\) 的凸包）、对于原函数定义域内的部分保持原值。故答案为与原函数凸包对应的结果。'
    knowledge_tag: '二次共轭函数'
    options:
      - key: 'A'
        text: '\(f^{**}(x) = x(10-x) - 3\)（即原函数本身）'
      - key: 'B'
        text: '\(f^{**}(x) = -3\)'
      - key: 'C'
        text: '分段形式：\(x<0\) 时为 0；\(0\le x\le10\) 时为 \(x(10-x)-3\)；\(x>10\) 时为 -3'
      - key: 'D'
        text: '\(f^{**}(x) = +\infty\)'
  - id: 'w3l2_q5'
    type: 'short_answer'
    stem: '对优化理论课堂，你还有哪些建议和期待？'
    reference_answer: '开放题，无标准答案。可从以下角度回答：希望增加更多实际应用案例（如机器学习、信号处理中的优化问题）、希望讲解更多证明思路、希望增加编程实践环节、希望讲得更慢/更详细、对某个特定知识点有疑问、希望推荐参考书等。'
