quiz_id: 'w6_l1'
title: 'Week6-L1 课堂小测（C语言与Python对比）'
questions:
  - id: 'w6l1_q1'
    type: 'single_choice'
    stem: '以下对C语言和Python说法错误的是：'
    correct_answer: 'C'
    explanation: 'Python是解释型语言，运行速度通常比C语言慢；C语言需要手动管理内存（malloc/free），Python有自动垃圾回收机制；Python的语法更简洁，学习门槛更低。'
    knowledge_tag: 'C与Python对比'
    options:
      - key: 'A'
        text: 'C语言是编译型语言，Python是解释型语言'
      - key: 'B'
        text: 'C语言需要手动管理内存，Python有自动垃圾回收'
      - key: 'C'
        text: 'Python的运行速度通常比C语言更快'
      - key: 'D'
        text: 'Python的语法比C语言更简洁，学习门槛更低'

  - id: 'w6l1_q2'
    type: 'multi_choice'
    stem: '相比于C语言，Python的优势在于：（多选）'
    correct_answer: 'A,B,C,D'
    explanation: 'Python语法简洁易学，拥有丰富的第三方库生态（NumPy、Pandas、PyTorch等），支持快速原型开发，且具有跨平台特性。C语言在底层控制和运行效率方面更有优势。'
    knowledge_tag: 'Python优势'
    options:
      - key: 'A'
        text: '语法简洁，代码量更少，开发效率高'
      - key: 'B'
        text: '拥有丰富的第三方库（如NumPy、Pandas、PyTorch）'
      - key: 'C'
        text: '支持快速原型开发和迭代'
      - key: 'D'
        text: '跨平台性好，无需针对不同系统重新编译'
      - key: 'E'
        text: '更适合编写操作系统内核和嵌入式底层驱动'
      - key: 'F'
        text: '运行效率比C语言更高'

