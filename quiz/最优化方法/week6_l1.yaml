    type: 'short_answer'
    short_answer_mode: 'code'
    stem: '请将你的冒泡排序Python代码粘贴到下方：'
    reference_answer: "arr = [5, 2, 8, 1, 3]\nn = len(arr)\n\nfor i in range(n - 1):\n    for j in range(n - 1 - i):\n        if arr[j] > arr[j + 1]:\n            arr[j], arr[j + 1] = arr[j + 1], arr[j]\nprint(f\"排序后: {arr}\")"

