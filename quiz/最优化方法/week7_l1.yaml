quiz_id: 'w7_l1'
title: 'Week7-L1 课堂小测（Python编程工具与实践）'
questions:
  - id: 'w7l1_q1'
    type: 'multi_choice'
    stem: '相比于C语言，Python的优势在于：（多选）'
    correct_answer: 'A,B,C,D'
    explanation: 'Python语法简洁易学，拥有丰富的第三方库生态（NumPy、Pandas、Matplotlib等），支持快速原型开发，且具有跨平台特性。C语言在底层控制和运行效率方面更有优势。'
    knowledge_tag: 'Python优势'
    options:
      - key: 'A'
        text: '语法简洁，代码量更少，开发效率高'
      - key: 'B'
        text: '拥有丰富的第三方库（如NumPy、Pandas、Matplotlib）'
      - key: 'C'
        text: '支持快速原型开发和迭代'
      - key: 'D'
        text: '跨平台性好，无需针对不同系统重新编译'
      - key: 'E'
        text: '运行效率比C语言更高'
      - key: 'F'
        text: '更适合编写操作系统内核和嵌入式底层驱动'

  - id: 'w7l1_q2'
    type: 'single_choice'
    stem: 'matplotlib.pyplot相比于MATLAB绘图，在语法上有什么不同？'
    correct_answer: 'C'
    explanation: 'matplotlib.pyplot模仿MATLAB的绘图接口，但需要显式调用plt.show()来显示图形。MATLAB会自动显示图形，而Python需要明确告诉程序何时显示。此外，matplotlib使用面向对象的方式（fig, ax）进行更复杂的绘图操作。'
    knowledge_tag: 'matplotlib与MATLAB对比'
    options:
      - key: 'A'
        text: 'matplotlib使用plot()函数，MATLAB使用draw()函数'
      - key: 'B'
        text: 'matplotlib不支持多子图绘制，MATLAB支持'
      - key: 'C'
        text: 'matplotlib需要显式调用plt.show()显示图形，MATLAB自动显示'
      - key: 'D'
        text: 'matplotlib只能绘制2D图形，MATLAB可以绘制3D图形'

  - id: 'w7l1_q3'
    type: 'single_choice'
    stem: '以下关于VSCode的说法错误的是：'
    correct_answer: 'D'
    explanation: 'VSCode是微软开发的免费开源代码编辑器，支持多种编程语言，拥有丰富的插件生态系统。通过安装Python扩展，可以获得代码补全、调试、linting等功能。VSCode本身是轻量级编辑器，不是集成开发环境(IDE)，但通过扩展可以达到IDE的功能。'
    knowledge_tag: 'VSCode特性'
    options:
      - key: 'A'
        text: 'VSCode是免费开源的代码编辑器'
      - key: 'B'
        text: 'VSCode支持通过扩展安装Python语言支持'
      - key: 'C'
        text: 'VSCode支持代码调试和断点功能'
      - key: 'D'
        text: 'VSCode不支持Git版本控制功能'

  - id: 'w7l1_q4'
    type: 'single_choice'
    stem: '以下关于Jupyter的说法错误的是：'
    correct_answer: 'C'
    explanation: 'Jupyter Notebook是一个交互式的计算环境，支持在网页中编写和运行代码。它采用单元格(Cell)的形式组织代码，可以逐个运行，非常适合数据分析、机器学习等需要交互式探索的场景。Jupyter支持多种编程语言（Python、R、Julia等），不仅限于Python。每个单元格可以单独运行和修改，无需重新运行整个程序。'
    knowledge_tag: 'Jupyter特性'
    options:
      - key: 'A'
        text: 'Jupyter支持在浏览器中交互式运行Python代码'
      - key: 'B'
        text: 'Jupyter可以在代码单元格中混合代码和文档说明'
      - key: 'C'
        text: 'Jupyter只能运行完整的Python脚本，不能逐行执行'
      - key: 'D'
        text: 'Jupyter可以直接显示图表和可视化结果'

