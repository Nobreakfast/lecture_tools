quiz_id: 'week12_l1'
title: 'Week12 实验课小册（Paddle MNIST 全连接网络）'
questions:
  - id: 'w12l1_q1'
    type: 'short_answer'
    short_answer_mode: 'text'
    stem: '本次训练中，loss 的总体趋势是什么？请写清楚你是从哪一段曲线或哪几个数值看出来的。'
    reference_answer: '开放作答。学生应结合训练曲线或输出数值，说明 loss 总体下降、波动或其他观察，并给出依据。'
    knowledge_tag: '训练过程观察'
    fixed_position: true

  - id: 'w12l1_q2'
    type: 'short_answer'
    short_answer_mode: 'text'
    stem: 'accuracy 上升说明模型发生了什么变化？请结合训练集或测试集准确率，用自己的话说明。'
    reference_answer: '开放作答。学生应说明 accuracy 上升表示模型预测正确比例提高，并结合 train_acc 或 test_acc 描述。'
    knowledge_tag: '模型评估'
    fixed_position: true

  - id: 'w12l1_q3'
    type: 'short_answer'
    short_answer_mode: 'text'
    stem: '你在预测结果中看到哪些数字比较容易混淆？请写出至少一组数字，并说明你认为可能造成混淆的原因。'
    reference_answer: '开放作答。学生应写出至少一组容易混淆的数字，并从手写形状相近、笔画不清楚、样本差异等角度解释。'
    knowledge_tag: '预测结果分析'
    fixed_position: true

  - id: 'w12l1_q4'
    type: 'short_answer'
    short_answer_mode: 'text'
    stem: '请记录你对 num_epochs 的修改实验：你把 num_epochs 从多少改成了多少？训练结果发生了什么变化？你认为可能原因是什么？'
    reference_answer: '开放作答。学生应写清楚 num_epochs 的原值和新值，描述 train_acc/test_acc 或训练曲线变化，并分析训练轮数变化对学习效果的影响。'
    knowledge_tag: '训练轮数实验'
    fixed_position: true

  - id: 'w12l1_q5'
    type: 'short_answer'
    short_answer_mode: 'text'
    stem: '请记录你对 hidden_size 的修改实验：你把 hidden_size 从多少改成了多少？训练结果发生了什么变化？你认为可能原因是什么？'
    reference_answer: '开放作答。学生应写清楚 hidden_size 的原值和新值，描述 train_acc/test_acc 或训练速度、效果变化，并分析隐藏层神经元数量对模型表达能力的影响。'
    knowledge_tag: '隐藏层规模实验'
    fixed_position: true
