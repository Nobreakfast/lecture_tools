quiz_id: 'robot_week4_l1'
title: 'Week4-L1 课堂问卷（机器人控制技术）'
questions:
  - id: 'robot_w4l1_q1'
    type: 'survey'
    stem: '第一题：课程考核方式你更倾向于哪种？'
    options:
      - key: 'A'
        text: '期末考试为主'
      - key: 'B'
        text: '三次作业为主'
      - key: 'C'
        text: '考试与作业结合'
      - key: 'D'
        text: '都可以，听课程安排'

  - id: 'robot_w4l1_q2'
    type: 'survey'
    stem: '第二题：你希望课程在理论和应用之间如何平衡？'
    options:
      - key: 'A'
        text: '理论为主（约 70% 理论，30% 应用）'
      - key: 'B'
        text: '理论稍多（约 60% 理论，40% 应用）'
      - key: 'C'
        text: '理论与应用均衡（约 50% : 50%）'
      - key: 'D'
        text: '应用稍多（约 40% 理论，60% 应用）'
      - key: 'E'
        text: '应用为主（约 30% 理论，70% 应用）'

  - id: 'robot_w4l1_q3'
    type: 'survey'
    allow_multiple: true
    stem: '第三题（多选）：你对以下哪些职业方向感兴趣？'
    options:
      - key: 'A'
        text: '电气工程师（电气设计、调试、运维）'
      - key: 'B'
        text: '自动化工程师（PLC/SCADA/产线控制）'
      - key: 'C'
        text: '机器人调试与应用工程师'
      - key: 'D'
        text: '机器人系统集成工程师'
      - key: 'E'
        text: '运动控制/伺服控制工程师'
      - key: 'F'
        text: '嵌入式控制工程师（MCU/RTOS）'
      - key: 'G'
        text: '机器视觉工程师（工业检测/识别）'
      - key: 'H'
        text: '自动驾驶相关岗位（感知/定位/规划/控制）'
      - key: 'I'
        text: 'AI 算法工程师（CV/NLP/多模态）'
      - key: 'J'
        text: '具身智能/机器人学习方向（模仿学习、强化学习）'
      - key: 'K'
        text: '科研方向（读研/读博）'
      - key: 'L'
        text: '其他'

  - id: 'robot_w4l1_q4'
    type: 'survey'
    allow_multiple: true
    stem: '第四题（多选）：毕业后你的计划是？'
    options:
      - key: 'A'
        text: '升学（考研/保研/出国）'
      - key: 'B'
        text: '直接找工作'
      - key: 'C'
        text: '考公/考编'
      - key: 'D'
        text: '创业或参与创业团队'
      - key: 'E'
        text: '暂未确定'

  - id: 'robot_w4l1_q5'
    type: 'survey'
    allow_multiple: true
    stem: '第五题（多选）：你对这门课哪些“拓展或课外”部分更感兴趣？'
    options:
      - key: 'A'
        text: '目标检测'
      - key: 'B'
        text: '3D 目标检测'
      - key: 'C'
        text: 'NLP'
      - key: 'D'
        text: '语音识别'
      - key: 'E'
        text: '自动驾驶相关话题'
      - key: 'F'
        text: 'VLA'
      - key: 'G'
        text: 'VLN'
      - key: 'H'
        text: '模仿学习'
      - key: 'I'
        text: '其他（可在下一题补充）'

  - id: 'robot_w4l1_q6'
    type: 'short_answer'
    stem: '第六题（简答）：你对这门课有哪些期待？有哪些想问老师的问题？有哪些对老师的建议？'
    reference_answer: '开放题，无标准答案。可从课程内容深度、理论与实践比例、案例类型、作业形式、课堂节奏、希望补充的话题、对老师的建议等方面填写。'
